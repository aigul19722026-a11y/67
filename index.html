<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ОКП: Отдел Контроля Подражателей</title>
    <style>
        body {
            background-color: #050505;
            color: #00ff00;
            font-family: 'Courier New', Courier, monospace;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
            overflow: hidden;
            user-select: none;
        }

        #game-container {
            width: 90%;
            max-width: 550px;
            background-color: #111;
            border: 3px solid #aa0000;
            padding: 25px;
            box-shadow: 0 0 20px rgba(170, 0, 0, 0.5);
            text-align: center;
            border-radius: 8px;
            position: relative;
            z-index: 2;
        }

        #pause-btn {
            position: absolute;
            top: 15px;
            right: 15px;
            background-color: #333;
            padding: 5px 10px;
            font-size: 12px;
            border: 1px solid #555;
            color: white;
            cursor: pointer;
        }
        #pause-btn:hover { background-color: #444; }

        h1 {
            color: #aa0000;
            font-size: 24px;
            margin-top: 0;
            letter-spacing: 2px;
            text-shadow: 0 0 5px rgba(170, 0, 0, 0.8);
        }

        #score-board {
            color: #888;
            font-size: 14px;
            margin-bottom: 20px;
        }

        #monitor {
            background-color: #1a1a1a;
            border: 2px solid #333;
            padding: 20px;
            min-height: 200px;
            text-align: left;
            margin: 20px 0;
            border-radius: 5px;
            box-shadow: inset 0 0 10px #000;
        }

        .stat-line {
            margin: 8px 0;
            font-size: 16px;
            line-height: 1.4;
        }

        .anomaly-box {
            color: #ff9900;
            margin-top: 15px;
            border-top: 1px dashed #555;
            padding-top: 10px;
        }

        .btn-group {
            display: flex;
            justify-content: space-around;
            margin-top: 20px;
        }

        button {
            font-family: 'Courier New', Courier, monospace;
            font-size: 16px;
            font-weight: bold;
            padding: 12px 24px;
            border: none;
            cursor: pointer;
            border-radius: 4px;
            transition: background 0.2s;
            color: white;
        }

        #btn-allow { background-color: #005500; }
        #btn-allow:hover { background-color: #008800; }

        #btn-alarm { background-color: #550000; }
        #btn-alarm:hover { background-color: #880000; }

        #btn-next {
            background-color: #333;
            margin-top: 15px;
            width: 100%;
        }
        #btn-next:hover { background-color: #444; }

        /* ЭКРАН СКРИМЕРА НА ВЕСЬ БРАУЗЕР */
        #screamer-overlay {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100vw;
            height: 100vh;
            background-color: #000;
            z-index: 9999;
            justify-content: center;
            align-items: center;
            color: #ff0000;
            font-weight: bold;
            overflow: hidden;
        }

        .screamer-face {
            font-size: 10px;
            line-height: 1.0;
            white-space: pre;
            text-align: center;
            font-family: monospace;
            text-shadow: 0 0 25px #ff0000;
        }

        /* УЛЬТРА-ТРЯСКА И ЗУМ ДЛЯ КРИКА ДМИТРИЯ */
        .screamer-shake {
            animation: hard-shake 0.03s infinite, flash-red 0.06s infinite, face-zoom 1.0s forwards;
        }

        @keyframes hard-shake {
            0% { transform: translate(15px, 12px) rotate(2deg); }
            50% { transform: translate(-15px, -12px) rotate(-2deg); }
            100% { transform: translate(12px, -15px) rotate(0deg); }
        }

        @keyframes flash-red {
            0%, 100% { color: #ff0000; background-color: #020000; }
            50% { color: #ffffff; background-color: #700; }
        }

        @keyframes face-zoom {
            0% { transform: scale(0.5); }
            40% { transform: scale(1.8); }
            100% { transform: scale(4.0); } /* Лицо буквально разрывает экран */
        }
    </style>
</head>
<body>

<div id="screamer-overlay">
    <div id="screamer-art" class="screamer-face"></div>
</div>

<div id="game-container">
    <button id="pause-btn" onclick="togglePause()">ПАУЗА</button>
    <h1>ПОСТ НАБЛЮДЕНИЯ #4</h1>
    <div id="score-board">Успешно проверено граждан: <span id="score">0</span></div>
    
    <div id="monitor">
        <div id="monitor-content" style="text-align: center; padding-top: 40px;">Кликните в любом месте, чтобы запустить терминал ОКП...</div>
    </div>

    <div class="btn-group">
        <button id="btn-allow" onclick="allowEntry()" style="display:none;">ВПУСТИТЬ</button>
        <button id="btn-alarm" onclick="triggerAlarm()" style="display:none;">ЛИКВИДИРОВАТЬ</button>
    </div>
    <button id="btn-next" onclick="nextVisitor()" style="display:none;">СЛЕДУЮЩИЙ В ОЧЕРЕДИ</button>
</div>

<script>
const humanNames = ["Алексей", "Елена", "Михаил", "Ольга", "Иван", "Дмитрий", "Анна", "Сергей", "Наталья", "Артем"];
const humanEyes = ["Карие, обычные", "Зеленые, ясные", "Голубые, уставшие", "Серые, испуганные"];
const humanAnomalies = [
    "Нет. Обычный гражданин, возвращается со смены.",
    "Нет. Жалуется на сильную головную боль и туман.",
    "Нет. Напуган слухами о подражателях, умоляет впустить.",
    "Нет. Потерял ключи от дома, просится погреться."
];

// ХОРРОР ASCII ИСКАЖЕННОЕ ЛИЦО ДЛЯ ТКСТ ДМИТРИЯ С ПУСТЫМИ ГЛАЗНИЦАМИ
const faceDmitriyCopy = `
       .XXXXXXXXXXXXX.
     .XXXXXXXXXXXXXXXXX.
    XXXXXXXXXXXXXXXXXXXXX
   XXXXX  [ ]     [ ]  XXXXX
  XXXXX   |X|     |X|   XXXXX
 XXXXXX   |_|     |_|   XXXXX
 XXXXXXXXXXXXXXXXXXXXXXXXXXX
 XXXXXXX  XXXXXXXXXXX  XXXXX
  XXXXXX  XXXXXXXXXXX  XXXXX
   XXXXX               XXXXX
    XXXXX  | | | | |  XXXXX
     XXXXX | | | | | XXXXX
       'XXXXXXXXXXXXX'
          |||||||||
`;

const monsters = [
    { 
        name: "txt.Dmitriy.copy", 
        eyes: "ОТСУТСТВУЮТ (ВЫРЕЗАНЫ/ПУСТОТА)", 
        pulse: "⚠️ ОШИБКА ЯДРА СЕРВЕРА (-1)", 
        anomaly: "Возраст по базе данных: 12930897 лет. Файл поврежден. Вместо лица — статичные помехи, система сканирования критически перегружена при попытке распознать этот объект.", 
        isMonster: true, 
        scaryMsg: "Файл txt.Dmitriy.copy полностью стирает вашу личность из базы данных. Из монитора вырывается бесконечный поток битых системных пикселей, утаскивая вас в пустоту кода... ЕМУ 12930897 ЛЕТ, ЕГО НЕЛЬЗЯ БЫЛО ВПУСКАТЬ!", 
        face: faceDmitriyCopy 
    },
    { 
        name: "Михаил", 
        eyes: "Черные... без белков", 
        pulse: "0 уд/мин", 
        anomaly: "Кожа бледная, а улыбка подозрительно широкая и неподвижная.", 
        isMonster: true, 
        scaryMsg: "Михаил резко удлиняет челюсть до пола, издает дикий вопль и разрывает вас на части прямо через разбитое стекло!", 
        face: faceDmitriyCopy 
    },
    { 
        name: "Неизвестный", 
        eyes: "Пустые темные глазницы", 
        pulse: "Ошибка прибора", 
        anomaly: "Вместо ответов издает непрерывный хруст ломающихся костей.", 
        isMonster: true, 
        scaryMsg: "Из пустых глазниц твари вырываются десятки черных щупалец, превращая вас в кровавое месиво...", 
        face: faceDmitriyCopy 
    }
];

let score = 0;
let currentVisitor = null;
let gameOver = false;
let isPaused = false;
let audioStarted = false;

let audioCtx = null;
let ambientOsc = null;
let ambientGain = null;

function initAudio() {
    if (audioStarted) return;
    audioCtx = new (window.AudioContext || window.webkitAudioContext)();
    
    ambientOsc = audioCtx.createOscillator();
    ambientGain = audioCtx.createGain();
    ambientOsc.type = 'sawtooth'; 
    ambientOsc.frequency.setValueAtTime(45, audioCtx.currentTime); 
    
    let filter = audioCtx.createBiquadFilter();
    filter.type = 'lowpass';
    filter.frequency.setValueAtTime(120, audioCtx.currentTime);

    ambientGain.gain.setValueAtTime(0.15, audioCtx.currentTime);
    
    ambientOsc.connect(filter);
    filter.connect(ambientGain);
    ambientGain.connect(audioCtx.destination);
    ambientOsc.start();
    audioStarted = true;
}

function playScreamerSound() {
    if (!audioCtx) return;
    let bufferSize = audioCtx.sampleRate * 1.5; 
    let buffer = audioCtx.createBuffer(1, bufferSize, audioCtx.sampleRate);
    let data = buffer.getChannelData(0);
    for (let i = 0; i < bufferSize; i++) {
        data[i] = Math.random() * 2 - 1; 
    }

    let noise = audioCtx.createBufferSource();
    noise.buffer = buffer;

    let noiseFilter = audioCtx.createBiquadFilter();
    noiseFilter.type = 'bandpass';
    noiseFilter.frequency.setValueAtTime(900, audioCtx.currentTime);
    noiseFilter.frequency.exponentialRampToValueAtTime(150, audioCtx.currentTime + 1.5);

    let noiseGain = audioCtx.createGain();
    noiseGain.gain.setValueAtTime(1.0, audioCtx.currentTime); // Максимальный уровень звука!
    noiseGain.gain.exponentialRampToValueAtTime(0.001, audioCtx.currentTime + 1.5);

    let bassOsc = audioCtx.createOscillator();
    bassOsc.type = 'sawtooth'; 
    bassOsc.frequency.setValueAtTime(130, audioCtx.currentTime);
    bassOsc.frequency.linearRampToValueAtTime(20, audioCtx.currentTime + 1.0);
    
    let bassGain = audioCtx.createGain();
    bassGain.gain.setValueAtTime(1.0, audioCtx.currentTime);
    bassGain.gain.exponentialRampToValueAtTime(0.001, audioCtx.currentTime + 1.0);

    noise.connect(noiseFilter);
    noiseFilter.connect(noiseGain);
    noiseGain.connect(audioCtx.destination);

    bassOsc.connect(bassGain);
    bassGain.connect(audioCtx.destination);

    noise.start();
    bassOsc.start();
}

const monitor = document.getElementById('monitor');
const monitorContent = document.getElementById('monitor-content');
const scoreText = document.getElementById('score');
const btnAllow = document.getElementById('btn-allow');
const btnAlarm = document.getElementById('btn-alarm');
const btnNext = document.getElementById('btn-next');
const container = document.getElementById('game-container');
const overlay = document.getElementById('screamer-overlay');
const screamerArt = document.getElementById('screamer-art');

document.body.addEventListener('click', function() {
    if (!audioStarted) {
        initAudio();
        nextVisitor();
    }
});

function togglePause() {
    if (gameOver || !audioStarted) return;
    isPaused = !isPaused;
    
    if (isPaused) {
        ambientGain.gain.setValueAtTime(0, audioCtx.currentTime);
        monitorContent.innerHTML = `<div style="text-align:center; font-size: 22px; padding-top:40px; color:#ff9900;">СИСТЕМА НА ПАУЗЕ</div>`;
        btnAllow.disabled = true;
        btnAlarm.disabled = true;
        document.getElementById('pause-btn').innerText = "ПРОДОЛЖИТЬ";
    } else {
        ambientGain.gain.setValueAtTime(0.15, audioCtx.currentTime);
        btnAllow.disabled = false;
        btnAlarm.disabled = false;
        document.getElementById('pause-btn').innerText = "ПАУЗА";
        renderVisitor();
    }
}

function generateRandomHuman() {
    return {
        name: humanNames[Math.floor(Math.random() * humanNames.length)],
        eyes: humanEyes[Math.floor(Math.random() * humanEyes.length)],
        pulse: Math.floor(Math.random() * (88 - 65 + 1)) + 65 + " уд/мин",
        anomaly: humanAnomalies[Math.floor(Math.random() * humanAnomalies.length)],
        isMonster: false, scaryMsg: "", face: ""
    };
}

function nextVisitor() {
    if(gameOver) {
        score = 0;
        scoreText.innerText = score;
        gameOver = false;
        overlay.style.display = "none";
        overlay.classList.remove('screamer-shake');
    }
    
    monitor.style.backgroundColor = "#1a1a1a";
    monitor.style.color = "#00ff00";
    btnAllow.style.display = "inline-block";
    btnAlarm.style.display = "inline-block";
    btnNext.style.display = "none";

    if (Math.random() < 0.6) { // Чуть увеличил шанс выпадения монстров для теста
        currentVisitor = monsters[Math.floor(Math.random() * monsters.length)];
    } else {
        currentVisitor = generateRandomHuman();
    }

    renderVisitor();
}

function renderVisitor() {
    monitorContent.innerHTML = `
        <div class="stat-line"><b>=== КРИТИЧЕСКАЯ ОШИБКА ДАННЫХ ===</b></div><br>
        <div class="stat-line"><b>Имя по документам:</b> <span style="color:#ff0000; font-weight:bold;">${currentVisitor.name}</span></div>
        <div class="stat-line"><b>Глаза:</b> ${currentVisitor.eyes}</div>
        <div class="stat-line"><b>Пульс:</b> ${currentVisitor.pulse}</div>
        <div class="stat-line anomaly-box"><b>Особые приметы / Аномалии:</b><br>>> ${currentVisitor.anomaly}</div>
    `;
}

function allowEntry() {
    if (isPaused) return;
    btnAllow.style.display = "none";
    btnAlarm.style.display = "none";
    
    if (currentVisitor.isMonster) {
        gameOver = true;
        ambientGain.gain.setValueAtTime(0, audioCtx.currentTime); 
        playScreamerSound(); 
        
        // Включаем жуткое безглазое лицо на весь экран
        screamerArt.innerText = currentVisitor.face;
        overlay.style.display = "flex";
        overlay.classList.add('screamer-shake');

        // Тряска и зум длятся 1 секунду, затем выводится отчет о смерти
        setTimeout(() => {
            overlay.classList.remove('screamer-shake');
            overlay.style.display = "none";
            
            monitor.style.backgroundColor = "#400";
            monitor.style.color = "#fff";
            monitorContent.innerHTML = `
                <div class="stat-line" style="color: #ff0000; font-size: 20px; font-weight: bold; text-align:center;">ОБЪЕКТ ПРОНИК В БУНКЕР!</div><br>
                <div class="stat-line">Вы впустили поврежденный файл...</div><br>
                <div class="stat-line" style="color: #ffcc00; background: #000; padding: 10px; border: 1px solid #ff0000;"><b>ОТЧЕТ ОБ АННИГИЛЯЦИИ:</b> ${currentVisitor.scaryMsg}</div>
            `;
            btnNext.innerText = "ПЕРЕЗАГРУЗИТЬ СЕРВЕР";
            btnNext.style.display = "block";
        }, 1000);

    } else {
        score++;
        scoreText.innerText = score;
        monitor.style.backgroundColor = "#003300";
        monitorContent.innerHTML = `<br><br><div class="stat-line" style="text-align:center; font-size: 18px;">Объект чист. Гражданин пропущен в бункер.</div>`;
        btnNext.innerText = "СЛЕДУЮЩИЙ В ОЧЕРЕДИ";
        btnNext.style.display = "block";
    }
}

function triggerAlarm() {
    if (isPaused) return;
    btnAllow.style.display = "none";
    btnAlarm.style.display = "none";

    if (currentVisitor.isMonster) {
        score++;
        scoreText.innerText = score;
        monitor.style.backgroundColor = "#003300";
        monitorContent.innerHTML = `<br><br><div class="stat-line" style="text-align:center; font-size: 18px; color: #00ff00; font-weight: bold;">УГРОЗА УНИЧТОЖЕНА.<br><br>Подражатель успешно изолирован и стерт из системы.</div>`;
    } else {
        score = Math.max(0, score - 1);
        scoreText.innerText = score;
        monitor.style.backgroundColor = "#555500";
        monitor.style.color = "#000";
        monitorContent.innerHTML = `<br><br><div class="stat-line" style="text-align:center; font-size: 18px; font-weight: bold;">ОШИБКА ИСПЫТАНИЯ.<br><br>Вы уничтожили невиновного человека. Списан штраф.</div>`;
    }
    btnNext.innerText = "СЛЕДУЮЩИЙ В ОЧЕРЕДИ";
    btnNext.style.display = "block";
}
</script>

</body>
</html>
