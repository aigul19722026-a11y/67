<html lang="ru">
<head>
    <meta charset="UTF-8">

    <title>ТЕРМИНАЛ ОКП-4</title>
    <style>
        body {
            background-color: #050b05;
            color: #00ff00;
            font-family: 'Courier New', Courier, monospace;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
            user-select: none;
        }

        #menu-screen, #game-screen {
            background-color: #000;
            border: 3px solid #00ff00;
            box-shadow: 0 0 20px rgba(0, 255, 0, 0.4);
            padding: 30px;
            width: 650px;
            text-align: center;
            box-sizing: border-box;
            position: relative;
            overflow: hidden;
        }

        #game-screen { display: none; }

        h1, h2 {
            text-shadow: 0 0 5px #00ff00;
            margin-top: 0;
        }

        .btn {
            background: #002200;
            color: #00ff00;
            border: 1px solid #00ff00;
            padding: 12px 20px;
            margin: 10px;
            cursor: pointer;
            font-family: inherit;
            font-weight: bold;
            font-size: 14px;
            transition: all 0.2s;
        }

        .btn:hover:not(:disabled) {
            background: #00ff00;
            color: #000;
            box-shadow: 0 0 10px #00ff00;
        }

        .btn:disabled {
            border-color: #004400;
            color: #004400;
            background: #000;
            cursor: not-allowed;
        }

        #monitor {
            background: #020d02;
            border: 2px solid #004400;
            height: 340px;
            margin: 20px 0;
            padding: 15px;
            text-align: left;
            overflow-y: auto;
            position: relative;
        }

        .stat-line {
            margin-bottom: 8px;
            font-size: 14px;
            line-height: 1.4;
        }

        .anomaly-box {
            border: 1px dashed #00ff00;
            padding: 8px;
            background: #041404;
        }

        #controls {
            display: flex;
            justify-content: space-around;
            flex-wrap: wrap;
        }

        .hud-bar {
            display: flex;
            justify-content: space-between;
            border-bottom: 1px solid #00ff00;
            padding-bottom: 5px;
            margin-bottom: 15px;
            font-size: 12px;
        }

        .flash-red {
            animation: flash 0.3s ease-out;
        }
        @keyframes flash {
            0% { background-color: #ff0000; }
            100% { background-color: #020d02; }
        }

        /* Стиль для хоррор-скримера */
        .terminal-glitch {
            animation: glitch-anim 0.05s infinite;
            background: #110000 !important;
            color: #ff3333 !important;
        }
        @keyframes glitch-anim {
            0% { transform: translate(2px, 1px); filter: blur(1px); }
            50% { transform: translate(-1px, -2px); filter: invert(0.2); }
            100% { transform: translate(1px, 2px); }
        }

        .matrix-error {
            font-size: 11px;
            color: #ff3333;
            line-height: 1.1;
            font-family: monospace;
            white-space: pre;
        }

        @keyframes blink {
            0%, 49% { opacity: 1; }
            50%, 100% { opacity: 0; }
        }
        .blinking { animation: blink 1s infinite; }
    </style>
</head>

    <div id="menu-screen">

        <button class="btn" onclick="startGame('infinite')">БЕСКОНЕЧНЫЙ РЕЖИМ</button>
