<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ОКП: Отдел Контроля Подражателей - HARDCORE VHS</title>
    <style>
        body {
            background-color: #020202;
            color: #00ff00;
            font-family: 'Courier New', Courier, monospace;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
            overflow: hidden;
            user-select: none;
        }

        /* КИНЕСКОП И СКАНИРУЮЩИЕ ЛИНИИ */
        .crt-screen {
            position: relative;
            width: 100%;
            max-width: 550px;
            padding: 25px;
            background-color: #060806;
            border: 6px solid #2b2b2b;
            border-radius: 30px;
            box-shadow: inset 0 0 50px rgba(0,0,0,1), 0 0 40px rgba(0, 255, 0, 0.1);
            overflow: hidden;
        }

        .crt-screen::before {
            content: " ";
            display: block;
            position: absolute;
            top: 0; left: 0; bottom: 0; right: 0;
            background: linear-gradient(rgba(18, 16, 16, 0) 50%, rgba(0, 0, 0, 0.4) 50%), linear-gradient(90deg, rgba(255, 0, 0, 0.04), rgba(0, 255, 0, 0.01), rgba(0, 0, 255, 0.04));
            z-index: 20;
            background-size: 100% 4px, 6px 100%;
            pointer-events: none;
        }

        .crt-flicker {
            animation: crt-glow 0.2s infinite;
        }

        @keyframes crt-glow {
            0% { opacity: 0.99; }
            50% { opacity: 1; }
            100% { opacity: 0.98; }
        }

        #game-container {
            position: relative;
            z-index: 5;
            text-align: center;
        }

        h1 {
            color: #ff0000;
            font-size: 20px;
            margin-top: 0;
            letter-spacing: 3px;
            text-shadow: 0 0 5px #ff0000;
        }

        #ui-box {
            display: flex;
            justify-content: space-between;
            color: #88fa88;
            font-size: 13px;
            margin-bottom: 10px;
        }

        #timer-container {
            width: 100%;
            height: 6px;
            background-color: #051105;
            margin-bottom: 15px;
            border-radius: 2px;
            overflow: hidden;
            border: 1px solid #004400;
        }

        #timer-bar {
            width: 100%;
            height: 100%;
            background-color: #00ff00;
            box-shadow: 0 0 8px #00ff00;
        }

        #monitor {
            background-color: #020402;
            border: 2px solid #00aa00;
            padding: 15px;
            min-height: 260px;
            text-align: left;
            margin: 15px 0;
            border-radius: 10px;
            box-shadow: inset 0 0 20px #000;
            transition: background-color 0.1s ease, opacity 0.05s ease;
        }

        .stat-line {
            margin: 5px 0;
            font-size: 14px;
            line-height: 1.3;
            text-shadow: 0 0 2px #00ff00;
        }

        /* ОТРИСОВКА РТА */
        .mouth-scanner {
            background-color: #000;
            border: 1px dashed #00ff00;
            padding: 8px;
            margin-top: 10px;
            font-family: monospace;
            text-align: center;
        }

        .anomaly-box {
            color: #ffaa00;
            margin-top: 10px;
            border-top: 1px dashed #00aa00;
            padding-top: 5px;
            text-shadow: 0 0 2px #ffaa00;
        }

        .btn-group {
            display: flex;
            justify-content: space-around;
            margin-top: 15px;
        }

        /* ТАКТИЛЬНЫЕ КНОПКИ */
        button.game-btn {
            font-family: 'Courier New', Courier, monospace;
            font-size: 14px;
            font-weight: bold;
            padding: 12px 24px;
            border: 2px solid #333;
            cursor: pointer;
            border-radius: 6px;
            color: white;
            transition: transform 0.05s, box-shadow 0.05s;
        }

        button.game-btn:active {
            transform: scale(0.92);
        }

        #btn-allow { 
            background-color: #004400; 
            border-color: #00ff00;
            box-shadow: 0 4px 0 #002200, 0 0 10px rgba(0,255,0,0.2); 
        }
        #btn-allow:active {
            box-shadow: 0 1px 0 #002200;
        }

        #btn-alarm { 
            background-color: #440000; 
            border-color: #ff0000;
            box-shadow: 0 4px 0 #220000, 0 0 10px rgba(255,0,0,0.2); 
        }
        #btn-alarm:active {
            box-shadow: 0 1px 0 #220000;
        }

        #btn-next {
            background-color: #222;
            margin-top: 15px;
            width: 100%;
            border: 1px solid #555;
            color: #fff;
        }

        /* ПОЛНОЭКРАННЫЙ СКРИМЕР — ЧИСТЫЙ АНАЛОГОВЫЙ ГЛИТЧ */
        #screamer-overlay {
            display: none;
            position: fixed;
            top: 0; left: 0; width: 100vw; height: 100vh;
            background-color: #ff0000;
            z-index: 9999;
            justify-content: center; align-items: center;
        }

        #glitch-face {
            font-size: 12px;
            color: #000;
            font-weight: bold;
            line-height: 8px;
            white-space: pre;
            text-align: center;
        }

        .screamer-active {
            animation: hard-shake 0.01s infinite, flash-screen 0.02s infinite;
        }

        @keyframes hard-shake {
            0% { transform: translate(15px, -15px) scale(1.3); filter: invert(0); }
            50% { transform: translate(-15px, 15px) scale(1.1) invert(1); }
            100% { transform: translate(10px, 10px) scale(1.4); }
        }

        @keyframes flash-screen {
            0%, 100% { background-color: #110000; }
            50% { background-color: #ff0000; }
        }
    </style>
</head>
<body>

<div id="screamer-overlay">
    <div id="glitch-face">
❌ СБОЙ МАТРИЦЫ ГЛАЗА ❌
💀 ТВАРИ ВНУТРИ 💀
💥 СИСТЕМА УНИЧТОЖЕНА 💥
⚡ СИСТЕМА УНИЧТОЖЕНА ⚡
☠️ ОШИБКА ☠️
    </div>
</div>

<div class="crt-screen crt-flicker">
    <div id="game-container">
        <h1>АНАЛОГОВЫЙ ТЕРМИНАЛ ОКП</h1>
        
        <div id="ui-box">
            <div>ОБРАБОТАНО: <span id="score" style="color:#00ff00; font-weight:bold;">0</span></div>
            <div>ЯДРО СЕКТОРА: <span id="lives">★★★</span></div>
        </div>

        <div id="timer-container">
            <div id="timer-bar"></div>
        </div>
        
        <div id="monitor">
            <div id="monitor-content" onclick="startGame()" style="text-align: center; padding-top: 75px; font-size: 14px; color: #ff3333; cursor:pointer; font-weight:bold; letter-spacing: 1px; line-height: 1.6;">
                [ КЛИКНИТЕ ПО ЭКРАНУ ДЛЯ ЗАПУСКА КИНЕСКОПА И СИНХРОНИЗАЦИИ ЗВУКА ]
            </div>
        </div>

        <div class="btn-group">
            <button id="btn-allow" class="game-btn" onclick="allowEntry()" style="display:none;">ВПУСТИТЬ</button>
            <button id="btn-alarm" class="game-btn" onclick="triggerAlarm()" style="display:none;">ЛИКВИДИРОВАТЬ</button>
        </div>
        <button id="btn-next" class="game-btn" onclick="nextVisitor()" style="display:none;">ЗАГРУЗИТЬ СЛЕДУЮЩИЙ ОБЪЕКТ</button>
    </div>
</div>

<script>
const humans = [
    { name: "Алексей П.", eyes: "Обычные", pulse: "74 уд/мин", mouth: "Норма", mouthDraw: "[|||||||||]\nЗубы чистые, десны розовые", anomaly: "Гражданин вернулся со смены в блоке гидро-очистки." },
    { name: "Елена К.", eyes: "Ясные", pulse: "81 уд/мин", mouth: "Норма", mouthDraw: "[|||||||||]\nСледов заражения не обнаружено", anomaly: "Жалуется на едкий запах гари на внешнем периметре." },
    { name: "Михаил В.", eyes: "Уставшие", pulse: "70 уд/мин", mouth: "Норма", mouthDraw: "[|||||||||]\nПрисутствуют следы табака", anomaly: "Шахтер. Документы покрыты угольной пылью." }
];

const monsters = [
    { 
        name: "Неизвестный", 
        eyes: "Стеклянные", 
        pulse: "140 уд/мин", 
        mouth: "ЧЁРНЫЕ ЗУБЫ", 
        mouthDraw: "[▰▰▰▰▰▰▰▰▰]\n⚠️ ЗУБНАЯ ЭМАЛЬ ПОЛНОСТЬЮ ОБУГЛЕНА", 
        anomaly: "ПРИЗНАК: Объект пытается не открывать рот при разговоре.", 
        isMonster: true, 
        scaryMsg: "Подражатель с чёрными зубами перекусил кабели питания терминала вместе со всеми твоими пальцами." 
    },
    { 
        name: "Анна С.", 
        eyes: "Бегающие", 
        pulse: "45 уд/мин", 
        mouth: "КРОВЬ НА ДЁСНАХ", 
        mouthDraw: "[|🩸|🩸||🩸|]\n⚠️ ВЫДЕЛЕНИЕ ЧЕРНОЙ КРОВИ ИЗ-ПОД РЕЗЦОВ", 
        anomaly: "ПРИЗНАК: Сканер зафиксировал скрытое гниение тканей челюсти.", 
        isMonster: true, 
        scaryMsg: "Зараженная Анна разверзла пасть прямо перед твоим лицом. Твой сектор заражен." 
    }
];

let score = 0;
let lives = 3;
let currentVisitor = null;
let gameOver = false;
let audioStarted = false;

let audioCtx = null;
let osc1 = null, osc2 = null;
let ambientGain = null;

let timeLeft = 100;
let timerInterval = null;
let baseTime = 7000; 

// ПОЛНАЯ ИНИЦИАЛИЗАЦИЯ ЗВУКОВОГО ДВИЖКА (РЕШАЕТ ПРОБЛЕМУ БЛОКИРОВКИ БРАУЗЕРА)
function initAudioEngine() {
    if (audioStarted) return;
    try {
        audioCtx = new (window.AudioContext || window.webkitAudioContext)();
        
        // НАГНЕТАЮЩАЯ МУЗЫКА (Тяжелый аналоговый гул и пульсация)
        osc1 = audioCtx.createOscillator();
        osc2 = audioCtx.createOscillator();
        ambientGain = audioCtx.createGain();
        
        osc1.type = 'sawtooth';
        osc1.frequency.setValueAtTime(36, audioCtx.currentTime); // Сверхнизкий гул
        
        osc2.type = 'sine';
        osc2.frequency.setValueAtTime(38, audioCtx.currentTime); // Интерференция, создающая биение
        
        let lowpass = audioCtx.createBiquadFilter();
        lowpass.type = 'lowpass';
        lowpass.frequency.setValueAtTime(70, audioCtx.currentTime);

        ambientGain.gain.setValueAtTime(0.25, audioCtx.currentTime); // Громкий, давящий фон
        
        osc1.connect(lowpass);
        osc2.connect(lowpass);
        lowpass.connect(ambientGain);
        ambientGain.connect(audioCtx.destination);
        
        osc1.start();
        osc2.start();
        
        audioStarted = true;
    } catch(e) { console.log("Ошибка аудио:", e); }
}

// ЗВУК ПРОПУСКА (ЭЛЕКТРОННЫЙ КЛИК)
function playAllowSound() {
    if (!audioCtx) return;
    let osc = audioCtx.createOscillator();
    let gain = audioCtx.createGain();
    
    osc.type = 'sine';
    osc.frequency.setValueAtTime(600, audioCtx.currentTime);
    osc.frequency.exponentialRampToValueAtTime(1000, audioCtx.currentTime + 0.08);
    
    gain.gain.setValueAtTime(0.3, audioCtx.currentTime);
    gain.gain.exponentialRampToValueAtTime(0.001, audioCtx.currentTime + 0.08);
    
    osc.connect(gain);
    gain.connect(audioCtx.destination);
    osc.start();
    osc.stop(audioCtx.currentTime + 0.08);
}

// МОЩНЫЙ ВЫСТРЕЛ ИЗ ДРОБОВИКА (ГЕНЕРИРУЕТСЯ КОДОМ, НЕ ОТВАЛИТСЯ)
function playShotgunShot() {
    if (!audioCtx) return;
    
    let bufferSize = audioCtx.sampleRate * 0.8; // Длина 0.8 сек
    let buffer = audioCtx.createBuffer(1, bufferSize, audioCtx.sampleRate);
    let data = buffer.getChannelData(0);
    
    // Наполняем мощным агрессивным взрывным шумом
    for (let i = 0; i < bufferSize; i++) {
        data[i] = Math.random() * 2 - 1;
    }
    
    let noiseNode = audioCtx.createBufferSource();
    noiseNode.buffer = buffer;
    
    let filter = audioCtx.createBiquadFilter();
    filter.type = 'lowpass';
    // Фильтр резко падает, имитируя глухой раскат взрыва пороха и эхо в бункере
    filter.frequency.setValueAtTime(1200, audioCtx.currentTime);
    filter.frequency.exponentialRampToValueAtTime(150, audioCtx.currentTime + 0.6);
    
    let gain = audioCtx.createGain();
    gain.gain.setValueAtTime(1.5, audioCtx.currentTime); // Хлёсткий пик
    gain.gain.exponentialRampToValueAtTime(0.001, audioCtx.currentTime + 0.7);
    
    noiseNode.connect(filter);
    filter.connect(gain);
    gain.connect(audioCtx.destination);
    noiseNode.start();
}

// СИНТЕТИЧЕСКИЙ ЖУТКИЙ ВОПЛЬ ДЛЯ СКРИМЕРА
function playScreamerSound() {
    if (!audioCtx) return;
    let osc = audioCtx.createOscillator();
    let gain = audioCtx.createGain();
    
    osc.type = 'sawtooth';
    osc.frequency.setValueAtTime(150, audioCtx.currentTime);
    osc.frequency.linearRampToValueAtTime(900, audioCtx.currentTime + 0.4);
    
    // Модуляция ужаса
    let mod = audioCtx.createOscillator();
    let modGain = audioCtx.createGain();
    mod.frequency.setValueAtTime(50, audioCtx.currentTime);
    modGain.gain.setValueAtTime(100, audioCtx.currentTime);
    
    mod.connect(modGain);
    modGain.connect(osc.frequency);
    
    gain.gain.setValueAtTime(0.8, audioCtx.currentTime);
    gain.gain.linearRampToValueAtTime(0.001, audioCtx.currentTime + 1.2);
    
    osc.connect(gain);
    gain.connect(audioCtx.destination);
    
    mod.start();
    osc.start();
    mod.stop(audioCtx.currentTime + 1.2);
    osc.stop(audioCtx.currentTime + 1.2);
}

const monitor = document.getElementById('monitor');
const monitorContent = document.getElementById('monitor-content');
const scoreText = document.getElementById('score');
const livesText = document.getElementById('lives');
const timerBar = document.getElementById('timer-bar');
const btnAllow = document.getElementById('btn-allow');
const btnAlarm = document.getElementById('btn-alarm');
const btnNext = document.getElementById('btn-next');
const overlay = document.getElementById('screamer-overlay');

function startGame() {
    initAudioEngine();
    nextVisitor();
}

function startTimer() {
    clearInterval(timerInterval);
    timeLeft = 100;
    timerBar.style.width = "100%";
    timerBar.style.backgroundColor = "#00ff00";
    
    let currentLimit = Math.max(2000, baseTime - (score * 400)); 
    let step = 100 / (currentLimit / 40);

    timerInterval = setInterval(() => {
        if (gameOver) return;
        timeLeft -= step;
        if (timeLeft < 0) timeLeft = 0;
        timerBar.style.width = timeLeft + "%";

        if(timeLeft < 50) timerBar.style.backgroundColor = "#ffaa00";
        if(timeLeft < 25) timerBar.style.backgroundColor = "#ff0000";

        if (timeLeft <= 0) {
            clearInterval(timerInterval);
            executeScreamer("ВРЕМЯ ИСТЕКЛО! Тварь выбила гермозатвор консоли!");
        }
    }, 40);
}

function nextVisitor() {
    if(gameOver) {
        score = 0;
        lives = 3;
        scoreText.innerText = score;
        livesText.innerText = "★★★";
        gameOver = false;
        overlay.style.display = "none";
        overlay.classList.remove('screamer-active');
        if(ambientGain) ambientGain.gain.setValueAtTime(0.25, audioCtx.currentTime);
    }
    
    monitor.style.backgroundColor = "#020402";
    monitor.style.opacity = "1";
    
    btnAllow.style.display = "inline-block";
    btnAlarm.style.display = "inline-block";
    btnNext.style.display = "none";

    let monsterChance = Math.min(0.85, 0.3 + (score * 0.07));
    if (Math.random() < monsterChance) {
        currentVisitor = monsters[Math.floor(Math.random() * monsters.length)];
    } else {
        currentVisitor = humans[Math.floor(Math.random() * humans.length)];
    }

    renderVisitor();
    startTimer();
}

function renderVisitor() {
    monitorContent.innerHTML = `
        <div class="stat-line" style="color:#ff3333; font-weight:bold;">[ПРОТОКОЛ ТЕРМИНАЛА ОКП]</div>
        <div class="stat-line"><b>Субъект:</b> ${currentVisitor.name}</div>
        <div class="stat-line"><b>Сетчатка:</b> ${currentVisitor.eyes}</div>
        <div class="stat-line"><b>Пульс:</b> ${currentVisitor.pulse}</div>
        
        <div class="stat-line" style="color:#00ffff; margin-top:5px;"><b>[СКАНИРОВАНИЕ ПОЛОСТИ РТА]:</b></div>
        <div class="mouth-scanner">
            <span style="color:${currentVisitor.isMonster ? '#ff0000' : '#00ff00'}">${currentVisitor.mouthDraw}</span>
        </div>

        <div class="stat-line anomaly-box"><b>База данных / Логи периметра:</b><br>>> ${currentVisitor.anomaly}</div>
    `;
}

function executeScreamer(msg) {
    gameOver = true;
    clearInterval(timerInterval);
    
    if (ambientGain) ambientGain.gain.setValueAtTime(0, audioCtx.currentTime); 
    btnAllow.style.display = "none";
    btnAlarm.style.display = "none";
    
    playScreamerSound();
    overlay.style.display = "flex";
    overlay.classList.add('screamer-active');

    setTimeout(() => {
        overlay.classList.remove('screamer-active');
        overlay.style.display = "none";
        
        monitor.style.backgroundColor = "#2a0000";
        monitorContent.innerHTML = `
            <div class="stat-line" style="color: #ff0000; font-size: 16px; font-weight: bold; text-align:center;">🔴 БУНКЕР ПАЛ 🔴</div><br>
            <div class="stat-line" style="color: #ffcc00; background: #000; padding: 10px; border: 1px solid #ff0000; font-size:12px;"><b>ОТЧЕТ СИСТЕМЫ ПЕРИМЕТРА:</b><br>${msg}</div>
        `;
        btnNext.innerText = "ПЕРЕЗАПУСТИТЬ ТЕРМИНАЛ";
        btnNext.style.display = "block";
    }, 1300);
}

function allowEntry() {
    if (gameOver) return;
    clearInterval(timerInterval);
    
    btnAllow.style.display = "none";
    btnAlarm.style.display = "none";
    
    // АНИМАЦИЯ И ЗВУК ПРОПУСКА
    playAllowSound();
    monitor.style.backgroundColor = "#004400"; // Зеленая вспышка экрана
    
    setTimeout(() => {
        if (currentVisitor.isMonster) {
            executeScreamer(currentVisitor.scaryMsg);
        } else {
            score++;
            scoreText.innerText = score;
            monitor.style.backgroundColor = "#020c02";
            monitorContent.innerHTML = `<br><br><div class="stat-line" style="text-align:center; font-size: 15px; color:#00ff00; font-weight:bold;">ШЛЮЗ РАЗБЛОКИРОВАН.<br>Объект зашел в жилой сектор.</div>`;
            btnNext.style.display = "block";
        }
    }, 150);
}

function triggerAlarm() {
    if (gameOver) return;
    clearInterval(timerInterval);
    
    btnAllow.style.display = "none";
    btnAlarm.style.display = "none";

    // ХЛЁСТКИЙ ВЫСТРЕЛ ИЗ ДРОБОВИКА И ТЕМНЫЙ ЭКРАН
    playShotgunShot();
    monitor.style.opacity = "0";
    monitor.style.backgroundColor = "#000000";

    setTimeout(() => {
        monitor.style.opacity = "1";
        if (currentVisitor.isMonster) {
            score++;
            scoreText.innerText = score;
            monitor.style.backgroundColor = "#020c02";
            monitorContent.innerHTML = `<br><br><div class="stat-line" style="text-align:center; font-size: 15px; color: #00ff00; font-weight: bold;">УГРОЗА ЛИКВИДИРОВАНА.<br>Камера шлюза очищена выстрелом.</div>`;
            btnNext.style.display = "block";
        } else {
            lives--;
            let stars = "";
            for(let i=0; i<3; i++) stars += i < lives ? "★" : "☆";
            livesText.innerText = stars;

            if (lives <= 0) {
                executeScreamer("Вы расстреляли слишком много мирных граждан. Командование заблокировало ваш сектор.");
            } else {
                monitor.style.backgroundColor = "#221100";
                monitorContent.innerHTML = `<br><br><div class="stat-line" style="text-align:center; font-size: 15px; color: #ffaa00; font-weight: bold;">ОШИБКА ДЕПАРТАМЕНТА!<br>Ликвидирован человек с чистым ртом. Наложен штраф.</div>`;
                btnNext.style.display = "block";
            }
        }
    }, 400); 
}
</script>

</body>
</html>
