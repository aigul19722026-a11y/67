<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ТЕРМИНАЛ ОКП-4</title>
    <style>
        body {
            background-color: #050b05;
            color: #00ff00;
            font-family: 'Courier New', Courier, monospace;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
            user-select: none;
        }

        #menu-screen, #game-screen {
            background-color: #000;
            border: 3px solid #00ff00;
            box-shadow: 0 0 20px rgba(0, 255, 0, 0.4);
            padding: 30px;
            width: 650px;
            text-align: center;
            box-sizing: border-box;
            position: relative;
            overflow: hidden;
        }

        #game-screen { display: none; }

        h1, h2 {
            text-shadow: 0 0 5px #00ff00;
            margin-top: 0;
        }

        .btn {
            background: #002200;
            color: #00ff00;
            border: 1px solid #00ff00;
            padding: 12px 20px;
            margin: 10px;
            cursor: pointer;
            font-family: inherit;
            font-weight: bold;
            font-size: 14px;
            transition: all 0.2s;
        }

        .btn:hover:not(:disabled) {
            background: #00ff00;
            color: #000;
            box-shadow: 0 0 10px #00ff00;
        }

        .btn:disabled {
            border-color: #004400;
            color: #004400;
            background: #000;
            cursor: not-allowed;
        }

        #monitor {
            background: #020d02;
            border: 2px solid #004400;
            height: 340px;
            margin: 20px 0;
            padding: 15px;
            text-align: left;
            overflow-y: auto;
            position: relative;
        }

        .stat-line {
            margin-bottom: 8px;
            font-size: 14px;
            line-height: 1.4;
        }

        .anomaly-box {
            border: 1px dashed #00ff00;
            padding: 8px;
            background: #041404;
        }

        #controls {
            display: flex;
            justify-content: space-around;
            flex-wrap: wrap;
        }

        .hud-bar {
            display: flex;
            justify-content: space-between;
            border-bottom: 1px solid #00ff00;
            padding-bottom: 5px;
            margin-bottom: 15px;
            font-size: 12px;
        }

        .flash-red {
            animation: flash 0.3s ease-out;
        }
        @keyframes flash {
            0% { background-color: #330000; }
            100% { background-color: #020d02; }
        }

        .screamer-glitch {
            animation: glitch-anim 0.05s infinite;
            background: #0d0000 !important;
            color: #ff0000 !important;
        }
        @keyframes glitch-anim {
            0% { transform: translate(3px, 1px) scaleY(1.01); filter: hue-rotate(90deg); }
            50% { transform: translate(-2px, -1px) scaleX(0.99); filter: invert(0.1); }
            100% { transform: translate(1px, 3px) scaleY(1); }
        }

        .matrix-error {
            font-size: 11px;
            color: #ff3333;
            line-height: 1.1;
            font-family: monospace;
            white-space: pre;
        }

        @keyframes blink {
            0%, 49% { opacity: 1; }
            50%, 100% { opacity: 0; }
        }
        .blinking { animation: blink 1s infinite; }
    </style>
</head>
<body>

    <div id="menu-screen">
        <h1>СИСТЕМА КОНТРОЛЯ ПЕРИМЕТРА</h1>
        <h2>[ОКП-4: ТЕРМИНАЛ ПРОПУСКА]</h2>
        <p style="margin: 30px 0; font-size: 14px; line-height: 1.6;">
            ВНИМАНИЕ! Зафиксирована биологическая угроза «Cryptococcus» и появление сущностей-подражателей.<br><br>
            <span style="color: #ff3333;">Ошибочный пропуск угрозы приведет к прорыву периметра.</span>
        </p>
        <button class="btn" onclick="startGame('classic')">КЛАССИЧЕСКИЙ РЕЖИМ</button>
        <button class="btn" onclick="startGame('infinite')">БЕСКОНЕЧНЫЙ РЕЖИМ</button>
    </div>

    <div id="game-screen">
        <div class="hud-bar">
            <span id="hud-mode">Режим: ---</span>
            <span id="hud-score">Обработано: 0/50</span>
            <span id="hud-lives" style="color: #ff5555;">Стабильность шлюза: 100%</span>
        </div>

        <div id="monitor"></div>

        <div id="controls">
            <button class="btn" id="btn-camera" onclick="toggleCamera()">[ ] ВКЛЮЧИТЬ КАМЕРУ</button>
            <button class="btn" id="btn-in" style="border-color: #55ff55;" onclick="processVisitor(true)">ВПУСТИТЬ</button>
            <button class="btn" id="btn-out" style="border-color: #ff5555;" onclick="processVisitor(false)">ОТКАЗАТЬ В ВХОДЕ</button>
            <button class="btn" id="btn-shoot" style="border-color: #ff3333; background: #200;" onclick="shootVisitor()">❌ ЛИКВИДИРОВАТЬ</button>
        </div>
    </div>

    <script>
        // База данных. Заменили прямые пути картинок на ID и встроенную графику (индексы)
        const database = [
            { 
                id: 0, name: "Ольга К. (?)", filename: "olga.png",
                eyes: "⚠️ ДВА ЗРАЧКА В ОДНОМ ГЛАЗУ", pulse: "0 уд/мин (ОТКАЗ ДАТЧИКА)", 
                mouthDraw: "[|||||||||]\nЗубы имитируют норму. Улыбка зафиксирована.", 
                backpack: "Расчёска, записная книжка, старая фотография.",
                hasContraband: false, isMonster: true, 
                anomaly: "ПРИЗНАК: Датчик пульса показывает ноль. Слишком долго смотрит прямо в объектив камеры.",
                scaryMsg: "Существо с поликорией (Ольга К.) приняло облик человека. Ночью оно бесшумно вскрыло вентиляцию жилого отсека. Сектор зачищен органикой.",
                silhouette: "      .---.\n     /     \\\n    | () () |  <-- [ВНИМАНИЕ: АНОМАЛИЯ ЗРАЧКОВ]\n    |   ^   |\n     \\ === /\n      `---'"
            },
            { 
                id: 1, name: "Неизвестный рабочий", filename: "worker.png",
                eyes: "⚠️ ПОЛНОЕ ОТСУТСТВИЕ СЛЁЗНОГО КАНАЛА И БЕЛКОВ", pulse: "190 уд/мин (КРИТИЧЕСКАЯ ТАХИКАРДИЯ)", 
                mouthDraw: "[|||||||||]\nМеталлический блеск в глубине челюсти.", 
                backpack: "Разводной ключ, пустая фляга, медный кабель.",
                hasContraband: false, isMonster: true, 
                anomaly: "ПРИЗНАК: Спецовка испачкана неизвестным биоматериалом.",
                scaryMsg: "Гибрид прорвался во внутренний периметр бункера. Модифицированная стальная челюсть пробила гермодвери жилых комнат.",
                silhouette: "      .---.\n     / # # \\\n    |  [X]  | <-- [ФИКСАЦИЯ ИНОРОДНЫХ МЕТАЛЛОВ]\n    |  ===  |\n     \\_____/\n      /_|_\\[]"
            },
            { 
                id: 2, name: "Подражатель «Ложная копия»", filename: "mimic.png",
                eyes: "⚠️ АСИММЕТРИЯ: Зрачки сфокусированы в разных направлениях", pulse: "45 уд/мин (АНАТОМИЧЕСКАЯ АНОМАЛИЯ)", 
                mouthDraw: "[|#|#|#|#|#|]\nОШИБКА: Структура челюсти деформирована.", 
                backpack: "Инструменты, паёк, грязная ветошь.",
                hasContraband: false, isMonster: true, 
                anomaly: "ПРИЗНАК: Пытается имитировать человеческую мимику, но углы рта неестественно растянуты.",
                scaryMsg: "Ложная копия проникла на базу под видом техника. Системы жизнеобеспечения были отключены вручную перед штурмом.",
                silhouette: "     .------.\n    /  o  .  \\\n   |    __    | <-- [НЕЕСТЕСТВЕННОЕ РАСТЯЖЕНИЕ КОЖИ]\n   |   \\__/   |\n    \\        /\n     `------'"
            },
            { 
                id: 3, name: "Охранник смены (Григорий)", filename: "guard.png",
                eyes: "НОРМА: Сетчатка соответствует базе данных, реакция на свет есть", pulse: "115 уд/мин (ПОВЫШЕН ИЗ-ЗА СТРЕССА)", 
                mouthDraw: "[=========]\nПолость рта в норме. Зубной ряд без деформаций.", 
                backpack: "Табельный устав, пачка сигарет, фонарик.",
                hasContraband: false, isMonster: false, 
                anomaly: "ПРИЗНАК: Зафиксировано сильное психоэмоциональное напряжение.",
                scaryMsg: "Вы заперли Григория снаружи. Оставшись без патронов, он погиб у ворот, пытаясь достучаться до терминала.",
                silhouette: "      .---.\n     /=====\\\n    |  O O  |  <-- [БИОМЕТРИЯ СОВПАДАЕТ НА 100%]\n    |   _   |\n     \\ ___ /\n      `---'"
            },
            { 
                id: 4, name: "Гражданская (Анна)", filename: "civilian.png",
                eyes: "НОРМА: Радужка чистая, капилляры расширены от паники", pulse: "140 уд/мин (ТАКТИЛЬНЫЙ ШОК)", 
                mouthDraw: "[=========]\nСлизистые чистые, аномалий не обнаружено.", 
                backpack: "Документы, сухой паёк, тёплый свитер.",
                hasContraband: false, isMonster: false, 
                anomaly: "ПРИЗНАК: Объект находится в состоянии тяжелого стресса, плачет.",
                scaryMsg: "Вы оставили гражданское лицо за шлюзом периметра. Датчики зафиксировали критическое падение её жизненных показателей.",
                silhouette: "       .---.\n      / ~ ~ \\\n     |  ; ;  | <-- [СЛЁЗНЫЕ ВЫДЕЛЕНИЯ, СТРЕСС]\n     |   .   |\n      \\  -  /\n       `---'"
            },
            { 
                id: 5, name: "Рабочий снабжения (Петр)", filename: "supplier.png",
                eyes: "НОРМА: Реакция зрачков адекватная", pulse: "88 уд/мин (НОРМА)",
                mouthDraw: "[=========]\nПолость рта без изменений.",
                backpack: "⚠️ ВНИМАНИЕ: Обнаружена незарегистрированная ампула с мутагеном 'Cryptococcus'!",
                hasContraband: true, isMonster: false,
                anomaly: "ПРИЗНАК: Пытается спрятать рюкзак от сканера вещей.",
                scaryMsg: "Вы пропустили контрабанду штамма. Спустя 48 часов вирус распространился через вентиляцию бункера.",
                silhouette: "      .---.\n     /  _  \\\n    |  o o  |  <-- [ОРГАНИКА В НОРМЕ / КАНАЛ СВЯЗИ СТАБИЛЕН]\n    |   ¬   |\n     \\  -- /\n      `---'"
            }
        ];

        let gameMode = 'classic', score = 0, health = 100, currentVisitor = null;
        let cameraActive = false, gameOver = false, isProcessing = false;
        let monsterRageMode = false;

        const monitorContent = document.getElementById('monitor');
        const btnCamera = document.getElementById('btn-camera');

        let audioCtx = null;
        let ambientOsc = null, ambientGain = null;

        function initAudio() {
            if (!audioCtx) {
                audioCtx = new (window.AudioContext || window.webkitAudioContext)();
            }
            if (audioCtx.state === 'suspended') {
                audioCtx.resume();
            }
        }

        function startAmbient() {
            initAudio();
            if (ambientOsc) return;
            ambientOsc = audioCtx.createOscillator();
            ambientGain = audioCtx.createGain();
            ambientOsc.type = 'sawtooth';
            ambientOsc.frequency.setValueAtTime(45, audioCtx.currentTime);
            
            const filter = audioCtx.createBiquadFilter();
            filter.type = 'lowpass';
            filter.frequency.setValueAtTime(120, audioCtx.currentTime);

            ambientOsc.connect(filter);
            filter.connect(ambientGain);
            ambientGain.connect(audioCtx.destination);
            
            ambientGain.gain.setValueAtTime(0.12, audioCtx.currentTime);
            ambientOsc.start();
        }

        function playSound(type) {
            initAudio();
            if (!audioCtx) return;
            
            const osc = audioCtx.createOscillator();
            const gain = audioCtx.createGain();
            osc.connect(gain);
            gain.connect(audioCtx.destination);
            const now = audioCtx.currentTime;

            if (type === 'click') {
                osc.type = 'sine'; osc.frequency.setValueAtTime(500, now);
                gain.gain.setValueAtTime(0.05, now); gain.gain.exponentialRampToValueAtTime(0.001, now + 0.05);
                osc.start(now); osc.stop(now + 0.05);
            } else if (type === 'scan') {
                osc.type = 'triangle'; osc.frequency.setValueAtTime(200, now);
                osc.frequency.linearRampToValueAtTime(400, now + 0.2);
                gain.gain.setValueAtTime(0.03, now); gain.gain.exponentialRampToValueAtTime(0.001, now + 0.2);
                osc.start(now); osc.stop(now + 0.2);
            } else if (type === 'shoot') {
                osc.type = 'sawtooth'; osc.frequency.setValueAtTime(100, now);
                osc.frequency.linearRampToValueAtTime(10, now + 0.4);
                gain.gain.setValueAtTime(0.4, now); gain.gain.linearRampToValueAtTime(0.001, now + 0.4);
                osc.start(now); osc.stop(now + 0.4);
            } else if (type === 'error') {
                osc.type = 'sawtooth'; osc.frequency.setValueAtTime(90, now);
                gain.gain.setValueAtTime(0.2, now); gain.gain.linearRampToValueAtTime(0.001, now + 0.3);
                osc.start(now); osc.stop(now + 0.3);
            } else if (type === 'siren') {
                osc.type = 'sawtooth'; osc.frequency.setValueAtTime(250, now);
                osc.frequency.linearRampToValueAtTime(150, now + 0.6);
                gain.gain.setValueAtTime(0.3, now); gain.gain.linearRampToValueAtTime(0.001, now + 0.6);
                osc.start(now); osc.stop(now + 0.6);
            }
        }

        function setButtonsDisabled(state) {
            document.getElementById('btn-in').disabled = state;
            document.getElementById('btn-out').disabled = state;
            document.getElementById('btn-shoot').disabled = state;
            btnCamera.disabled = state;
        }

        function startGame(mode) {
            gameMode = mode; score = 0; health = 100; gameOver = false; isProcessing = false; monsterRageMode = false;
            try {
                startAmbient();
                playSound('click');
            } catch(e) {}
            document.getElementById('menu-screen').style.display = 'none';
            document.getElementById('game-screen').style.display = 'block';
            document.getElementById('hud-mode').innerText = `Режим: ${mode === 'classic' ? 'Классический' : 'Бесконечный'}`;
            updateHUD();
            nextVisitor();
        }

        function updateHUD() {
            document.getElementById('hud-score').innerText = gameMode === 'classic' ? `Обработано: ${score}/50` : `Счёт: ${score}`;
            document.getElementById('hud-lives').innerText = `Стабильность шлюза: ${health}%`;
            document.getElementById('hud-lives').style.color = health <= 35 ? '#ff3333' : '#ff5555';
        }

        function nextVisitor() {
            if (gameOver) return;
            cameraActive = false;
            monsterRageMode = false;
            btnCamera.innerText = "[ ] ВКЛЮЧИТЬ КАМЕРУ";
            btnCamera.style.background = "#002200";

            const randomIndex = Math.floor(Math.random() * database.length);
            currentVisitor = JSON.parse(JSON.stringify(database[randomIndex]));

            runScanningAnimation();
        }

        function runScanningAnimation() {
            isProcessing = true;
            setButtonsDisabled(true);
            let pct = 0;
            monitorContent.innerHTML = `<div style="padding-top:100px; text-align:center; font-weight:bold;" class="blinking">[ИНИЦИАЛИЗАЦИЯ ПОДКЛЮЧЕНИЯ...]</div>`;
            
            const interval = setInterval(() => {
                pct += 10;
                try { playSound('scan'); } catch(e){}
                monitorContent.innerHTML = `
                    <div style="padding-top:80px; text-align:center; font-family:monospace;">
                        <span style="color:#ff3333; font-weight:bold;">[ОКП-4: СКАНИРОВАНИЕ БИОМЕТРИИ ОБЪЕКТА]</span><br><br>
                        <div style="border: 1px solid #00ff00; width: 300px; height: 20px; margin: 10px auto; position:relative;">
                            <div style="background:#00ff00; width: ${pct}%; height:100%;"></div>
                        </div>
                        <span>ПРОГРЕСС: ${pct}%</span>
                    </div>`;
                if (pct >= 100) {
                    clearInterval(interval);
                    isProcessing = false;
                    setButtonsDisabled(false);
                    renderVisitor();
                }
            }, 800);
        }

        function renderVisitor() {
            if (gameOver) return;

            // Теперь при включении камеры мы используем ИНДЕКС (ID) посетителя
            if (cameraActive) {
                let displaySilhouette = currentVisitor.silhouette;
                let activeHeader = `• CAM_01_FEED: СИЛУЭТ ОБЪЕКТА (ID: 00${currentVisitor.id})`;
                
                if (monsterRageMode) {
                    activeHeader = `⚠️ [ТРЕВОГА: КРИТИЧЕСКИЙ СБОЙ ФОРМЫ]`;
                    displaySilhouette = "       .---------------.\n      /   \\ | /   \\ |   \\\n     |  (O)   (O)   (O)  | <-- [БИОМАССА МУТИРОВАЛА]\n     |     \\     /       |\n      \\   #######       /\n       `---------------'";
                }

                monitorContent.innerHTML = `
                    <div style="width: 100%; height: 100%; background: #000; font-family: monospace; font-size:12px; color:#00ff00; border: 1px solid #004400; padding:10px; box-sizing:border-box;">
                        <div class="blinking" style="margin-bottom:15px; border-bottom:1px dashed #00ff00; padding-bottom:5px;">${activeHeader}</div>
                        <pre style="line-height:1.2; color:#fff; font-weight:bold;">${displaySilhouette}</pre>
                        <div style="font-size:11px; color:#666; margin-top:20px;">* Оптический сенсор переведен в режим прямого матричного рендеринга индексов структуры.</div>
                    </div>`;
            } else {
                if (monsterRageMode) {
                    monitorContent.innerHTML = `
                        <div style="color:#ff3333; font-weight:bold; text-align:center; padding-top:60px;">
                            <h2 class="blinking">⚠️ КРИТИЧЕСКАЯ УГРОЗА СЕКТОРУ ⚠️</h2>
                            <p>ОБЪЕКТ МУТИРОВАЛ ПОСЛЕ ОБСТРЕЛА. СИСТЕМА ДВЕРЕЙ БЛОКИРОВАНА!</p>
                            <p style="color:#fff; margin-top:20px;">[ВКЛЮЧИТЕ КАМЕРУ ДЛЯ ИНСПЕКЦИИ ИНДЕКСА ФОРМЫ]</p>
                            <p style="color:#ff5555;">ТРЕБУЕТСЯ ПОВТОРНЫЙ ЗАЛП ТУРЕНЕЙ ДЛЯ ПОЛНОЙ ЛИ КВИДАЦИИ!</p>
                        </div>`;
                } else {
                    monitorContent.innerHTML = `
                        <div class="stat-line" style="color:#ff3333; font-weight:bold;">[ПРОТОКОЛ ТЕРМИНАЛА ОКП-4 — ОБЪЕКТ #${currentVisitor.id}]</div>
                        <div class="stat-line"><b>Субъект:</b> ${currentVisitor.name}</div>
                        <div class="stat-line"><b>Сетчатка глаза:</b> ${currentVisitor.eyes}</div>
                        <div class="stat-line"><b>Частота пульса:</b> ${currentVisitor.pulse}</div>
                        <div class="stat-line" style="color:#00ffff; margin-top:8px;"><b>[СКАНИРОВАНИЕ РОТОВОЙ ПОЛОСТИ]:</b></div>
                        <div class="stat-line" style="color: ${currentVisitor.isMonster ? '#ff5555' : '#00ff00'}">${currentVisitor.mouthDraw.replace(/\n/g, '<br>')}</div>
                        <div class="stat-line" style="color:#00ffff; margin-top:8px;"><b>[ИНСПЕКЦИЯ ЛИЧНЫХ ВЕЩЕЙ]:</b></div>
                        <div class="stat-line" style="color: ${currentVisitor.hasContraband ? '#ff3333' : '#00ff00'}">>> ${currentVisitor.backpack}</div>
                        <div class="stat-line anomaly-box" style="margin-top:10px;"><b>Анализ периметра:</b><br>>> ${currentVisitor.anomaly}</div>
                    `;
                }
            }
        }

        function toggleCamera() {
            if (gameOver || isProcessing) return;
            try { playSound('scan'); } catch(e){}
            cameraActive = !cameraActive;
            btnCamera.innerText = cameraActive ? "[👁️] КАМЕРА АКТИВНА" : "[ ] ВКЛЮЧИТЬ КАМЕРУ";
            btnCamera.style.background = cameraActive ? "#004400" : "#002200";
            renderVisitor();
        }

        function runDoorAnimation(callback) {
            isProcessing = true;
            setButtonsDisabled(true);
            let pct = 0;
            const interval = setInterval(() => {
                pct += 20;
                try { playSound('scan'); } catch(e){}
                monitorContent.innerHTML = `
                    <div style="padding-top:80px; text-align:center; color:#55ff55;">
                        <b>[ГИДРАВЛИКА: СИСТЕМА ГЕРМОЗАТВОРОВ]</b><br><br>
                        <span>ОТКРЫТИЕ ВНЕШНЕГО ШЛЮЗА... СЕКТОР ОКП-4</span><br>
                        <div style="border: 1px solid #55ff55; width: 250px; height: 15px; margin: 10px auto;">
                            <div style="background:#55ff55; width: ${pct}%; height:100%;"></div>
                        </div>
                        <b>СТАТУС ШЛЮЗА: ${pct}%</b>
                    </div>`;
                if (pct >= 100) {
                    clearInterval(interval);
                    isProcessing = false;
                    setButtonsDisabled(false);
                    callback();
                }
            }, 100);
        }

        function processVisitor(wantsToLetIn) {
            if (gameOver || isProcessing) return;

            if (monsterRageMode) {
                try { playSound('error'); } catch(e){}
                return;
            }

            if (wantsToLetIn) {
                if (currentVisitor.isMonster) {
                    triggerScreamer(currentVisitor.scaryMsg);
                    return;
                } else if (currentVisitor.hasContraband) {
                    triggerGameOver(currentVisitor.scaryMsg);
                    return;
                } else {
                    runDoorAnimation(() => {
                        score++;
                        checkWinCondition();
                    });
                }
            } else {
                if (currentVisitor.isMonster || currentVisitor.hasContraband) {
                    score++;
                } else {
                    health -= 35;
                    checkHealth(currentVisitor.scaryMsg);
                    return;
                }
                checkWinCondition();
            }
        }

        function shootVisitor() {
            if (gameOver || isProcessing) return;

            if (currentVisitor.isMonster && !monsterRageMode) {
                isProcessing = true;
                setButtonsDisabled(true);
                monitorContent.classList.add('flash-red');
                try { playSound('shoot'); } catch(e){}

                setTimeout(() => {
                    monitorContent.classList.remove('flash-red');
                    isProcessing = false;
                    setButtonsDisabled(false);
                    
                    monsterRageMode = true;
                    try { playSound('siren'); } catch(e){}
                    renderVisitor(); 
                }, 800);
                return;
            }

            isProcessing = true;
            setButtonsDisabled(true);
            monitorContent.classList.add('flash-red');
            try { playSound('shoot'); } catch(e){}

            setTimeout(() => {
                monitorContent.classList.remove('flash-red');
                isProcessing = false;
                setButtonsDisabled(false);

                if (monsterRageMode || currentVisitor.hasContraband) {
                    score++;
                    monsterRageMode = false;
                    checkWinCondition();
                } else {
                    health -= 50;
                    checkHealth("Вы ликвидировали лояльного гражданина бункера. Автоматический трибунал понизил стабильность секторов.");
                }
            }, 1000);
        }

        function checkHealth(reason) {
            try { playSound('error'); } catch(e){}
            updateHUD();
            if (health <= 0) {
                triggerGameOver(reason);
            } else {
                isProcessing = true; 
                setButtonsDisabled(true);
                monitorContent.innerHTML = `<div style="color:#ff3333; text-align:center; padding-top:80px; font-weight:bold;">[УРОН СИСТЕМЕ ПЕРИМЕТРА]<br><br>${reason}</div>`;
                setTimeout(() => {
                    nextVisitor();
                }, 2000);
            }
        }

        // Новый, проработанный хоррор-скример взлома терминала
        function triggerScreamer(message) {
            gameOver = true;
            setButtonsDisabled(true);
            monitorContent.classList.add('screamer-glitch');
            
            let count = 0;
            let sirenInterval = setInterval(() => {
                try { playSound('siren'); } catch(e){}
                count++;
                if(count > 12) clearInterval(sirenInterval);
            }, 150);

            // Генерируем массив "поломанных" данных на экране
            let noise = "";
            for(let i=0; i<8; i++) {
                noise += `ERROR_FATAL_CATASTROPHIC_SYSTEM_FAILURE_0x000${Math.floor(Math.random()*9)}A\n`;
            }

            monitorContent.innerHTML = `
                <div class="matrix-error">
                     ==================================================
                     [!!! СИСТЕМА УПРАВЛЕНИЯ ПЕРЕХВАТАКОВАНА СУЩЕСТВОМ !!!]
                     ==================================================
${noise}
                     [ДАТЧИКИ ЖИЗНИ СЕКТОРА ОКП-4: СБОЙ/НОЛЬ]
                     --------------------------------------------------
                     ПОТОК ДАННЫХ ПРЕРВАН БИОЛОГИЧЕСКОЙ МАССОЙ...
                </div>`;

            setTimeout(() => {
                monitorContent.classList.remove('screamer-glitch');
                triggerGameOver(message);
            }, 2000);
        }

        function checkWinCondition() {
            if (gameMode === 'classic' && score >= 50) {
                gameOver = true;
                monitorContent.innerHTML = `
                    <div style="color:#55ff55; text-align:center; padding-top:60px;">
                        <h2>=== ПОБЕДА ===</h2>
                        <p>Вы успешно отработали смену и спасли сектор ОКП-4 от заражения.</p>
                        <button class="btn" onclick="location.reload()">В ГЛАВНОЕ МЕНЮ</button>
                    </div>`;
            } else {
                updateHUD();
                nextVisitor();
            }
        }

        function triggerGameOver(message) {
            gameOver = true;
            setButtonsDisabled(true);
            monitorContent.innerHTML = `
                <div style="color:#ff3333; text-align:center; padding-top:30px; font-family:monospace;">
                    <h2 style="letter-spacing: 3px; text-shadow: 0 0 8px #ff0000;">🔴 СЕКТОР ПЕРИМЕТРА ПОТЕРЯН 🔴</h2>
                    <div style="border: 1px dashed #ff3333; padding: 15px; margin: 15px 0; background: #1a0505; font-size: 13px; line-height: 1.6; text-align: left; color: #ffcccc;">
                        <b>ОТЧЕТ СИСТЕМЫ:</b><br>
                        ${message}
                    </div>
                    <p style="margin-top: 15px; font-size:16px;"><b>Ваш результат обработки: <span style="color:#fff;">${score}</span></b></p>
                    <button class="btn" style="border-color:#ff3333; margin-top:10px;" onclick="location.reload()">ПЕРЕЗАГРУЗИТЬ ТЕРМИНАЛ</button>
                </div>`;
        }
    </script>
</body>
</html>
