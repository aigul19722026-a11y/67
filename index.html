<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ОКП: Отдел Контроля Подражателей - ANALOG HORROR v3.0</title>
    <style>
        body {
            background-color: #020202;
            color: #00ff00;
            font-family: 'Courier New', Courier, monospace;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
            overflow: hidden;
            user-select: none;
        }

        /* ЭФФЕКТ СТАРОВАТО КИНЕСКОПА И СКАНИРУЮЩИХ ЛИНИЙ */
        .crt-screen {
            position: relative;
            width: 100%;
            max-width: 550px;
            padding: 25px;
            background-color: #080a08;
            border: 4px solid #3a3a3a;
            border-radius: 25px;
            box-shadow: inset 0 0 40px rgba(0,0,0,1), 0 0 30px rgba(0, 255, 0, 0.15);
            overflow: hidden;
        }

        .crt-screen::before {
            content: " ";
            display: block;
            position: absolute;
            top: 0; left: 0; bottom: 0; right: 0;
            background: linear-gradient(rgba(18, 16, 16, 0) 50%, rgba(0, 0, 0, 0.35) 50%), linear-gradient(90deg, rgba(255, 0, 0, 0.05), rgba(0, 255, 0, 0.02), rgba(0, 0, 255, 0.05));
            z-index: 20;
            background-size: 100% 4px, 6px 100%;
            pointer-events: none;
        }

        .crt-flicker {
            animation: crt-glow 0.15s infinite;
        }

        @keyframes crt-glow {
            0% { opacity: 0.98; }
            50% { opacity: 1; }
            100% { opacity: 0.99; }
        }

        #game-container {
            position: relative;
            z-index: 5;
            text-align: center;
        }

        #pause-btn {
            position: absolute;
            top: 15px;
            right: 15px;
            background-color: #111;
            padding: 5px 10px;
            font-size: 12px;
            border: 1px solid #00ff00;
            color: #00ff00;
            cursor: pointer;
            z-index: 30;
        }

        h1 {
            color: #ff0000;
            font-size: 22px;
            margin-top: 0;
            letter-spacing: 4px;
            text-shadow: 0 0 5px #ff0000;
        }

        #ui-box {
            display: flex;
            justify-content: space-between;
            color: #88fa88;
            font-size: 14px;
            margin-bottom: 10px;
        }

        #timer-container {
            width: 100%;
            height: 6px;
            background-color: #051105;
            margin-bottom: 15px;
            border-radius: 2px;
            overflow: hidden;
            border: 1px solid #004400;
        }

        #timer-bar {
            width: 100%;
            height: 100%;
            background-color: #00ff00;
            box-shadow: 0 0 8px #00ff00;
        }

        #monitor {
            background-color: #030503;
            border: 2px solid #00aa00;
            padding: 20px;
            min-height: 220px;
            text-align: left;
            margin: 15px 0;
            border-radius: 10px;
            box-shadow: inset 0 0 20px #000;
            transition: background-color 0.1s ease, opacity 0.05s ease;
        }

        .stat-line {
            margin: 8px 0;
            font-size: 15px;
            line-height: 1.4;
            text-shadow: 0 0 3px #00ff00;
        }

        .anomaly-box {
            color: #ffaa00;
            margin-top: 15px;
            border-top: 1px dashed #00aa00;
            padding-top: 10px;
            text-shadow: 0 0 3px #ffaa00;
        }

        .btn-group {
            display: flex;
            justify-content: space-around;
            margin-top: 20px;
        }

        button.game-btn {
            font-family: 'Courier New', Courier, monospace;
            font-size: 15px;
            font-weight: bold;
            padding: 12px 26px;
            border: 2px solid #333;
            cursor: pointer;
            border-radius: 6px;
            color: white;
            transition: transform 0.05s, box-shadow 0.05s;
        }

        button.game-btn:active {
            transform: scale(0.92);
        }

        #btn-allow { 
            background-color: #005500; 
            border-color: #00ff00;
            box-shadow: 0 4px 0 #003300, 0 0 10px rgba(0,255,0,0.3); 
        }
        #btn-alarm { 
            background-color: #550000; 
            border-color: #ff0000;
            box-shadow: 0 4px 0 #330000, 0 0 10px rgba(255,0,0,0.3); 
        }
        #btn-next {
            background-color: #222;
            margin-top: 15px;
            width: 100%;
            border: 1px solid #555;
        }

        /* ПОЛНОЭКРАННЫЙ СКРИМЕР С РЕАЛЬНОЙ РОЖЕЙ ИЗ СЕТИ */
        #screamer-overlay {
            display: none;
            position: fixed;
            top: 0; left: 0; width: 100vw; height: 100vh;
            background-color: #000;
            z-index: 9999;
            justify-content: center; align-items: center;
            overflow: hidden;
        }

        #screamer-img {
            width: 100%;
            height: 100%;
            object-fit: cover;
            display: none;
        }

        .screamer-active {
            animation: hard-shake 0.015s infinite, flash-screen 0.03s infinite, zoom-in 0.4s forwards;
        }

        @keyframes hard-shake {
            0% { transform: translate(20px, 15px) scale(1.1); filter: contrast(2.5) brightness(1.3); }
            50% { transform: translate(-20px, -15px) scale(0.98) invert(1); filter: hue-rotate(90deg); }
            100% { transform: translate(15px, -20px) scale(1.15); filter: contrast(3); }
        }

        @keyframes flash-screen {
            0%, 100% { background-color: #000; }
            50% { background-color: #1a0000; }
        }

        @keyframes zoom-in {
            0% { transform: scale(1.0); }
            100% { transform: scale(1.8); }
        }
    </style>
</head>
<body>

<!-- Аудио-элементы для подгрузки реальных звуков из интернета -->
<audio id="snd-click" src="https://actions.google.com/sounds/v1/interfaces/simple_click.ogg" preload="auto"></audio>
<audio id="snd-shot" src="https://assets.mixkit.co/active_storage/sfx/2890/2890-84.wav" preload="auto"></audio>
<audio id="snd-scream" src="https://assets.mixkit.co/active_storage/sfx/953/953-84.wav" preload="auto"></audio>

<div id="screamer-overlay">
    <!-- Реальное жуткое глитч-лицо из сети -->
    <img id="screamer-img" src="https://images.unsplash.com/photo-1509248961158-e54f6934749c?q=80&w=1000&auto=format&fit=crop" alt="PROCESS_ERR">
</div>

<div class="crt-screen crt-flicker">
    <div id="game-container">
        <button id="pause-btn" onclick="togglePause()">ПАУЗА</button>
        <h1>АНАЛОГОВЫЙ ТЕРМИНАЛ ОКП</h1>
        
        <div id="ui-box">
            <div>УСПЕШНО: <span id="score" style="color:#00ff00; font-weight:bold;">0</span></div>
            <div id="lives-box">ЯДРО СЕКТОРА: <span id="lives">★★★</span></div>
        </div>

        <div id="timer-container">
            <div id="timer-bar"></div>
        </div>
        
        <div id="monitor">
            <div id="monitor-content" onclick="startGame()" style="text-align: center; padding-top: 55px; font-size: 15px; color: #ff3333; cursor:pointer; font-weight:bold; letter-spacing: 1px; line-height: 1.5;">
                [ НАЖМИТЕ НА ЭКРАН ДЛЯ ПОДКЛЮЧЕНИЯ К КИНЕСКОПУ ОБЪЕКТА ]
            </div>
        </div>

        <div class="btn-group">
            <button id="btn-allow" class="game-btn" onclick="allowEntry()" style="display:none;">ВПУСТИТЬ</button>
            <button id="btn-alarm" class="game-btn" onclick="triggerAlarm()" style="display:none;">ЛИКВИДИРОВАТЬ</button>
        </div>
        <button id="btn-next" class="game-btn" onclick="nextVisitor()" style="display:none;">СЛЕДУЮЩИЙ СЕКТОР ОБСЛЕДОВАНИЯ</button>
    </div>
</div>

<script>
const humans = [
    { name: "Алексей", eyes: "Карие, обычные", pulse: "74 уд/мин", anomaly: "Нет. Гражданин вернулся со смены в блоке очистки воды." },
    { name: "Елена", eyes: "Зеленые, ясные", pulse: "81 уд/мин", anomaly: "Нет. Жалуется на едкий запах гари на внешнем периметре." },
    { name: "Михаил", eyes: "Голубые, уставшие", pulse: "70 уд/мин", anomaly: "Нет. Шахтер, документы покрыты угольной пылью." },
    { name: "Ольга", eyes: "Серые, испуганные", pulse: "92 уд/мин", anomaly: "Нет. Слышала странный скрежет за стеной своего сектора." },
    { name: "Иван", eyes: "Карие, обычные", pulse: "65 уд/мин", anomaly: "Нет. Прибыл для передачи дежурного журнала смены." }
];

const monsters = [
    { 
        name: "txt.Dmitriy.copy", 
        eyes: "ОТСУТСТВУЮТ (ГЛУБОКАЯ ПУСТОТА)", 
        pulse: "⚠️ ОШИБКА ДЕШИФРАТОРА", 
        anomaly: "Возраст по логам: 12930897 лет. ФАЙЛ-ПРИЗРАК. Сигналы сканера ломаются об объект.", 
        isMonster: true, 
        scaryMsg: "Древний вирус кода txt.Dmitriy.copy стёр матрицу твоей личности. Ему было 12930897 лет... Скрипт закрыт." 
    },
    { 
        name: "Михаил", 
        eyes: "Полностью черные", 
        pulse: "0 уд/мин", 
        anomaly: "Температура тела: 4°C. Лицо деформировано в застывшей мертвой улыбке.", 
        isMonster: true, 
        scaryMsg: "Подражатель Михаил проник на пост. Он сорвал защитную маску терминала вместе с твоей головой." 
    },
    { 
        name: "Святослав", 
        eyes: "Стеклянные, не двигаются", 
        pulse: "14 уд/мин (сбои)", 
        anomaly: "ХАРДКОР: Под одеждой прощупываются множественные суставчатые конечности насекомого.", 
        isMonster: true, 
        scaryMsg: "Из Святослава вырвался гигантский инсектоид, уничтожив системы охлаждения терминала." 
    },
    { 
        name: "Анна", 
        eyes: "Человеческие", 
        pulse: "145 уд/мин", 
        anomaly: "ХАРДКОР: Сканер ДНК выявил, что объект состоит из биомассы 4 разных людей. Документы чистые.", 
        isMonster: true, 
        scaryMsg: "Морф Анна разделился на четыре части прямо внутри бункера, устроив резню на этажах." 
    }
];

let score = 0;
let lives = 3;
let currentVisitor = null;
let gameOver = false;
let isPaused = false;
let audioStarted = false;

let audioCtx = null;
let ambientGain = null;

let timeLeft = 100;
let timerInterval = null;
let baseTime = 7000; 

function initAudio() {
    if (audioStarted) return;
    try {
        audioCtx = new (window.AudioContext || window.webkitAudioContext)();
        
        let ambientOsc = audioCtx.createOscillator();
        ambientGain = audioCtx.createGain();
        ambientOsc.type = 'sawtooth'; 
        ambientOsc.frequency.setValueAtTime(32, audioCtx.currentTime); 
        
        let filter = audioCtx.createBiquadFilter();
        filter.type = 'lowpass';
        filter.frequency.setValueAtTime(80, audioCtx.currentTime);

        ambientGain.gain.setValueAtTime(0.12, audioCtx.currentTime);
        
        ambientOsc.connect(filter);
        filter.connect(ambientGain);
        ambientGain.connect(audioCtx.destination);
        ambientOsc.start();
        audioStarted = true;
    } catch(e) { console.log(e); }
}

const monitor = document.getElementById('monitor');
const monitorContent = document.getElementById('monitor-content');
const scoreText = document.getElementById('score');
const livesText = document.getElementById('lives');
const timerBar = document.getElementById('timer-bar');
const btnAllow = document.getElementById('btn-allow');
const btnAlarm = document.getElementById('btn-alarm');
const btnNext = document.getElementById('btn-next');
const overlay = document.getElementById('screamer-overlay');
const screamerImg = document.getElementById('screamer-img');

function startGame() {
    if (!audioStarted) {
        initAudio();
        nextVisitor();
    }
}

function startTimer() {
    clearInterval(timerInterval);
    timeLeft = 100;
    timerBar.style.width = "100%";
    timerBar.style.backgroundColor = "#00ff00";
    
    let currentLimit = Math.max(2000, baseTime - (score * 450)); 
    let step = 100 / (currentLimit / 40);

    timerInterval = setInterval(() => {
        if (isPaused || gameOver) return;
        timeLeft -= step;
        if (timeLeft < 0) timeLeft = 0;
        timerBar.style.width = timeLeft + "%";

        if(timeLeft < 50) timerBar.style.backgroundColor = "#ffaa00";
        if(timeLeft < 25) timerBar.style.backgroundColor = "#ff0000";

        if (timeLeft <= 0) {
            clearInterval(timerInterval);
            executeScreamer("ВРЕМЯ ИСТЕКЛО! Объект воспользовался задержкой шлюза и пробил стекло консоли!");
        }
    }, 40);
}

function nextVisitor() {
    if(gameOver) {
        score = 0;
        lives = 3;
        scoreText.innerText = score;
        livesText.innerText = "★★★";
        gameOver = false;
        overlay.style.display = "none";
        screamerImg.style.display = "none";
        overlay.classList.remove('screamer-active');
    }
    
    monitor.style.backgroundColor = "#030503";
    monitor.style.color = "#00ff00";
    monitor.style.opacity = "1";
    
    btnAllow.style.display = "inline-block";
    btnAlarm.style.display = "inline-block";
    btnNext.style.display = "none";

    let monsterChance = Math.min(0.8, 0.35 + (score * 0.06));
    if (Math.random() < monsterChance) {
        currentVisitor = monsters[Math.floor(Math.random() * monsters.length)];
    } else {
        currentVisitor = humans[Math.floor(Math.random() * humans.length)];
    }

    renderVisitor();
    startTimer();
}

function renderVisitor() {
    monitorContent.innerHTML = `
        <div class="stat-line" style="color:#ff3333; font-weight:bold;">[ПРОТОКОЛ ОБСЛЕДОВАНИЯ ОКП]</div><br>
        <div class="stat-line"><b>Имя:</b> ${currentVisitor.name}</div>
        <div class="stat-line"><b>Сетчатка:</b> ${currentVisitor.eyes}</div>
        <div class="stat-line"><b>Пульс:</b> ${currentVisitor.pulse}</div>
        <div class="stat-line anomaly-box"><b>Аномалии кинескопа:</b><br>>> ${currentVisitor.anomaly}</div>
    `;
}

function executeScreamer(msg) {
    gameOver = true;
    clearInterval(timerInterval);
    
    if (ambientGain && audioCtx) ambientGain.gain.setValueAtTime(0, audioCtx.currentTime); 
    btnAllow.style.display = "none";
    btnAlarm.style.display = "none";
    
    // Включаем РЕАЛЬНЫЙ крик и картинку
    document.getElementById('snd-scream').currentTime = 0;
    document.getElementById('snd-scream').play().catch(e => console.log(e));
    
    overlay.style.display = "flex";
    screamerImg.style.display = "block";
    overlay.classList.add('screamer-active');

    setTimeout(() => {
        overlay.classList.remove('screamer-active');
        overlay.style.display = "none";
        screamerImg.style.display = "none";
        
        monitor.style.backgroundColor = "#2a0000";
        monitor.style.color = "#fff";
        monitorContent.innerHTML = `
            <div class="stat-line" style="color: #ff0000; font-size: 18px; font-weight: bold; text-align:center;">СВЯЗЬ С СЕКТОРОМ ПОТЕРЯНА</div><br>
            <div class="stat-line" style="color: #ffcc00; background: #000; padding: 10px; border: 1px solid #ff0000;"><b>КОНЦОВКА АННИГИЛЯЦИИ:</b><br>${msg}</div>
        `;
        btnNext.innerText = "ПЕРЕЗАГРУЗИТЬ КИНЕСКОП ТЕРМИНАЛА";
        btnNext.style.display = "block";
    }, 1500);
}

function updateLives() {
    lives--;
    let stars = "";
    for(let i=0; i<3; i++) {
        stars += i < lives ? "★" : "☆";
    }
    livesText.innerText = stars;

    if (lives <= 0) {
        executeScreamer("Лимит ошибок исчерпан. Подражатели полностью дестабилизировали систему очистки.");
        return true;
    }
    return false;
}

function allowEntry() {
    if (isPaused || gameOver) return;
    clearInterval(timerInterval);
    
    btnAllow.style.display = "none";
    btnAlarm.style.display = "none";
    
    // Проигрываем РЕАЛЬНЫЙ звук клика/галочки
    document.getElementById('snd-click').currentTime = 0;
    document.getElementById('snd-click').play().catch(e => console.log(e));
    
    monitor.style.backgroundColor = "#003300";
    
    setTimeout(() => {
        if (currentVisitor.isMonster) {
            executeScreamer(currentVisitor.scaryMsg);
        } else {
            score++;
            scoreText.innerText = score;
            monitor.style.backgroundColor = "#031503";
            monitorContent.innerHTML = `<br><br><div class="stat-line" style="text-align:center; font-size: 16px; color:#00ff00; font-weight:bold;">ШЛЮЗ ЗАКРЫТ.<br>Гражданин успешно пропущен внутрь сектора.</div>`;
            btnNext.innerText = "ЗАГРУЗИТЬ СЛЕДУЮЩИЙ ОБЪЕКТ";
            btnNext.style.display = "block";
        }
    }, 150);
}

function triggerAlarm() {
    if (isPaused || gameOver) return;
    clearInterval(timerInterval);
    
    btnAllow.style.display = "none";
    btnAlarm.style.display = "none";

    // Проигрываем НАСТОЯЩИЙ выстрел дробовика
    document.getElementById('snd-shot').currentTime = 0;
    document.getElementById('snd-shot').play().catch(e => console.log(e));
    
    monitor.style.opacity = "0";
    monitor.style.backgroundColor = "#000000";

    setTimeout(() => {
        monitor.style.opacity = "1";
        if (currentVisitor.isMonster) {
            score++;
            scoreText.innerText = score;
            monitor.style.backgroundColor = "#031503";
            monitor.style.color = "#00ff00";
            monitorContent.innerHTML = `<br><br><div class="stat-line" style="text-align:center; font-size: 16px; color: #00ff00; font-weight: bold;">ОБЪЕКТ НЕЙТРАЛИЗОВАН.<br>Угроза выжжена из шлюзовой камеры.</div>`;
            btnNext.innerText = "ЗАГРУЗИТЬ СЛЕДУЮЩИЙ ОБЪЕКТ";
            btnNext.style.display = "block";
        } else {
            monitor.style.backgroundColor = "#221500";
            monitor.style.color = "#ffaa00";
            monitorContent.innerHTML = `<br><br><div class="stat-line" style="text-align:center; font-size: 16px; font-weight: bold;">ОШИБКА РАСЧЁТА ДЕПАРТАМЕНТА!<br>Ликвидирован чистый человек. Наложен штраф.</div>`;
            
            if (!updateLives()) {
                btnNext.innerText = "ЗАГРУЗИТЬ СЛЕДУЮЩИЙ ОБЪЕКТ";
                btnNext.style.display = "block";
            }
        }
    }, 450); 
}

function togglePause() {
    if (gameOver || !audioStarted) return;
    isPaused = !isPaused;
    
    if (isPaused) {
        clearInterval(timerInterval);
        if (ambientGain && audioCtx) ambientGain.gain.setValueAtTime(0, audioCtx.currentTime);
        monitorContent.innerHTML = `<div style="text-align:center; font-size: 20px; padding-top:55px; color:#ff9900; font-weight:bold; letter-spacing:2px;">КИНЕСКОП НА ПАУЗЕ</div>`;
        btnAllow.style.display = "none";
        btnAlarm.style.display = "none";
        document.getElementById('pause-btn').innerText = "ПРОДОЛЖИТЬ";
    } else {
        if (ambientGain && audioCtx) ambientGain.gain.setValueAtTime(0.12, audioCtx.currentTime);
        document.getElementById('pause-btn').innerText = "ПАУЗА";
        btnAllow.style.display = "inline-block";
        btnAlarm.style.display = "inline-block";
        renderVisitor();
        startTimer();
    }
}
</script>

</body>
</html>
