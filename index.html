<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ОКП: Отдел Контроля Подражателей - ХАРДКОР</title>
    <style>
        body {
            background-color: #030303;
            color: #00ff00;
            font-family: 'Courier New', Courier, monospace;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
            overflow: hidden;
            user-select: none;
        }

        #game-container {
            width: 90%;
            max-width: 550px;
            background-color: #0d0d0d;
            border: 3px solid #ff0000;
            padding: 25px;
            box-shadow: 0 0 30px rgba(255, 0, 0, 0.3);
            text-align: center;
            border-radius: 8px;
            position: relative;
            z-index: 2;
        }

        #pause-btn {
            position: absolute;
            top: 15px;
            right: 15px;
            background-color: #222;
            padding: 5px 10px;
            font-size: 12px;
            border: 1px solid #ff0000;
            color: #ff0000;
            cursor: pointer;
        }

        h1 {
            color: #ff0000;
            font-size: 24px;
            margin-top: 0;
            letter-spacing: 3px;
            text-shadow: 0 0 8px rgba(255, 0, 0, 0.9);
        }

        #ui-box {
            display: flex;
            justify-content: space-between;
            color: #aaa;
            font-size: 14px;
            margin-bottom: 10px;
        }

        #lives-box {
            color: #ff0000;
            font-weight: bold;
        }

        /* ТАЙМЕР ПАНИКИ */
        #timer-container {
            width: 100%;
            height: 8px;
            background-color: #222;
            margin-bottom: 15px;
            border-radius: 4px;
            overflow: hidden;
            border: 1px solid #333;
        }

        #timer-bar {
            width: 100%;
            height: 100%;
            background-color: #ff0000;
            transition: width 0.1s linear;
            box-shadow: 0 0 10px #ff0000;
        }

        #monitor {
            background-color: #111;
            border: 2px solid #ff0000;
            padding: 20px;
            min-height: 200px;
            text-align: left;
            margin: 15px 0;
            border-radius: 5px;
            box-shadow: inset 0 0 15px #000;
        }

        .stat-line {
            margin: 8px 0;
            font-size: 16px;
            line-height: 1.4;
        }

        .anomaly-box {
            color: #ffaa00;
            margin-top: 15px;
            border-top: 1px dashed #ff0000;
            padding-top: 10px;
        }

        .btn-group {
            display: flex;
            justify-content: space-around;
            margin-top: 20px;
        }

        button.game-btn {
            font-family: 'Courier New', Courier, monospace;
            font-size: 16px;
            font-weight: bold;
            padding: 12px 24px;
            border: 1px solid #ff0000;
            cursor: pointer;
            border-radius: 4px;
            color: white;
            text-shadow: 0 0 5px #000;
        }

        #btn-allow { background-color: #004400; box-shadow: 0 0 10px rgba(0,255,0,0.2); }
        #btn-allow:hover { background-color: #006600; }

        #btn-alarm { background-color: #440000; box-shadow: 0 0 10px rgba(255,0,0,0.2); }
        #btn-alarm:hover { background-color: #660000; }

        #btn-next {
            background-color: #222;
            margin-top: 15px;
            width: 100%;
            border: 1px solid #555;
        }
        #btn-next:hover { background-color: #333; }

        /* ЭКРАН СКРИМЕРА */
        #screamer-overlay {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100vw;
            height: 100vh;
            background-color: #000;
            z-index: 9999;
            justify-content: center;
            align-items: center;
            overflow: hidden;
        }

        #screamer-image {
            width: 100%;
            height: 100%;
            object-fit: cover;
            display: none;
        }

        .screamer-active {
            animation: hard-shake 0.02s infinite, flash-screen 0.04s infinite, zoom-in 0.6s forwards;
        }

        @keyframes hard-shake {
            0% { transform: translate(25px, 20px) scale(1.2); filter: hue-rotate(0deg) contrast(3); }
            50% { transform: translate(-25px, -20px) scale(0.9); filter: hue-rotate(180deg) invert(1); }
            100% { transform: translate(20px, -25px) scale(1.3); filter: hue-rotate(360deg) saturate(5); }
        }

        @keyframes flash-screen {
            0%, 100% { background-color: #000; }
            50% { background-color: #400; }
        }

        @keyframes zoom-in {
            0% { transform: scale(0.7); }
            100% { transform: scale(2.0); }
        }
    </style>
</head>
<body>

<div id="screamer-overlay">
    <svg id="screamer-image" viewBox="0 0 200 200" xmlns="http://www.w3.org/2000/svg">
        <rect width="200" height="200" fill="black"/>
        <circle cx="100" cy="95" r="55" fill="#151515"/>
        <ellipse cx="75" cy="85" rx="18" ry="24" fill="white"/>
        <ellipse cx="125" cy="85" rx="18" ry="24" fill="white"/>
        <circle cx="75" cy="85" r="6" fill="black"/>
        <circle cx="125" cy="85" r="6" fill="black"/>
        <ellipse cx="100" cy="145" rx="28" ry="40" fill="white"/>
        <ellipse cx="100" cy="145" rx="22" ry="34" fill="black"/>
        <path d="M 0,0 L 200,200 M 0,200 L 200,0" stroke="red" stroke-width="1" opacity="0.4"/>
    </svg>
</div>

<div id="game-container">
    <button id="pause-btn" onclick="togglePause()">ПАУЗА</button>
    <h1>РЕЖИМ: ЧИСТКА СИСТЕМЫ</h1>
    
    <div id="ui-box">
        <div>Успешно стерто/пропущено: <span id="score" style="color:#00ff00; font-weight:bold;">0</span></div>
        <div id="lives-box">ЦЕЛОСТНОСТЬ СИСТЕМЫ: <span id="lives">★★★</span></div>
    </div>

    <div id="timer-container">
        <div id="timer-bar"></div>
    </div>
    
    <div id="monitor">
        <div id="monitor-content" style="text-align: center; padding-top: 40px; font-size: 18px; color: #ff0000; cursor:pointer; animation: pulse 1s infinite;">
            ⚠️ НАЖМИ СЮДА ДЛЯ ЗАПУСКА ПРОТОКОЛА ОКП ⚠️
        </div>
    </div>

    <div class="btn-group">
        <button id="btn-allow" class="game-btn" onclick="allowEntry()" style="display:none;">ВПУСТИТЬ</button>
        <button id="btn-alarm" class="game-btn" onclick="triggerAlarm()" style="display:none;">ЛИКВИДИРОВАТЬ</button>
    </div>
    <button id="btn-next" class="game-btn" onclick="nextVisitor()" style="display:none;">ЗАГРУЗИТЬ СЛЕДУЮЩИЙ ОБЪЕКТ</button>
</div>

<script>
const humanNames = ["Алексей", "Елена", "Михаил", "Ольга", "Иван", "Дмитрий", "Анна", "Сергей", "Наталья", "Артем"];
const humanEyes = ["Карие, обычные", "Зеленые, ясные", "Голубые, уставшие", "Серые, испуганные"];
const humanAnomalies = [
    "Нет. Обычный гражданин, возвращается со смены.",
    "Нет. Жалуется на туман за стеной бункера.",
    "Нет. Просит чашку воды.",
    "Нет. Документы в полном порядке."
];

const monsters = [
    { 
        name: "txt.Dmitriy.copy", 
        eyes: "ОТСУТСТВУЮТ (ЧЕРНЫЕ ДЫРЫ)", 
        pulse: "⚠️ КРИТИЧЕСКИЙ СБОЙ ЯДРА", 
        anomaly: "Возраст: 12930897 лет. СИСТЕМА ПЕРЕГРУЖЕНА. Объект искажает код интерфейса.", 
        isMonster: true, 
        scaryMsg: "Древний вирус txt.Dmitriy.copy поглотил ядро терминала. Ему 12930897 лет. Из твоих колонок вырвался крик миллиардов стертых душ..." 
    },
    { 
        name: "Михаил", 
        eyes: "Полностью черные", 
        pulse: "0 уд/мин", 
        anomaly: "Дыхание отсутствует. Лицо неподвижно застыло в широкой ухмылке.", 
        isMonster: true, 
        scaryMsg: "Подражатель Михаил пробрался внутрь. Он сорвал обшивку и затащил тебя в вентиляцию..." 
    },
    { 
        name: "Иван", 
        eyes: "Человеческие", 
        pulse: "190 уд/мин", 
        anomaly: "Прибор зафиксировал скрытые под кожей металлические импланты и хруст.", 
        isMonster: true, 
        scaryMsg: "Иван оказался замаскированным био-киборгом. Защитные турели не успели среагировать." 
    }
];

let score = 0;
let lives = 3;
let currentVisitor = null;
let gameOver = false;
let isPaused = false;
let audioStarted = false;

let audioCtx = null;
let ambientGain = null;

let timeLeft = 100;
let timerInterval = null;
let baseTime = 7000; // Начальное время: 7 секунд на человека

function initAudio() {
    if (audioStarted) return;
    audioCtx = new (window.AudioContext || window.webkitAudioContext)();
    
    let ambientOsc = audioCtx.createOscillator();
    ambientGain = audioCtx.createGain();
    ambientOsc.type = 'sawtooth'; 
    ambientOsc.frequency.setValueAtTime(35, audioCtx.currentTime); 
    
    let filter = audioCtx.createBiquadFilter();
    filter.type = 'lowpass';
    filter.frequency.setValueAtTime(100, audioCtx.currentTime);

    ambientGain.gain.setValueAtTime(0.2, audioCtx.currentTime);
    
    ambientOsc.connect(filter);
    filter.connect(ambientGain);
    ambientGain.connect(audioCtx.destination);
    ambientOsc.start();
    audioStarted = true;
}

function playHumanScream() {
    if (!audioCtx) return;
    let duration = 1.4;
    let sampleRate = audioCtx.sampleRate;
    let bufferSize = sampleRate * duration;
    let buffer = audioCtx.createBuffer(1, bufferSize, sampleRate);
    let data = buffer.getChannelData(0);

    for (let i = 0; i < bufferSize; i++) {
        let t = i / sampleRate;
        let noise = Math.random() * 2 - 1;
        let vocal = Math.sin(2 * Math.PI * 210 * t + Math.sin(2 * Math.PI * 60 * t) * 4);
        data[i] = (vocal * 0.3) + (noise * 0.7);
    }

    let source = audioCtx.createBufferSource();
    source.buffer = buffer;

    let filter = audioCtx.createBiquadFilter();
    filter.type = 'bandpass';
    filter.Q.setValueAtTime(5, audioCtx.currentTime);
    filter.frequency.setValueAtTime(1200, audioCtx.currentTime);
    filter.frequency.exponentialRampToValueAtTime(350, audioCtx.currentTime + duration);

    let distortion = audioCtx.createWaveShaper();
    let curve = new Float32Array(44100);
    for (let i=0; i<44100; ++i) {
        let x = (i * 2) / 44100 - 1;
        curve[i] = (3 + 150) * x * 20 * (Math.PI/180) / (Math.PI + 150 * Math.abs(x));
    }
    distortion.curve = curve;

    let gain = audioCtx.createGain();
    gain.gain.setValueAtTime(1.5, audioCtx.currentTime);
    gain.gain.exponentialRampToValueAtTime(0.001, audioCtx.currentTime + duration);

    source.connect(filter);
    filter.connect(distortion);
    distortion.connect(gain);
    gain.connect(audioCtx.destination);
    source.start();
}

const monitor = document.getElementById('monitor');
const monitorContent = document.getElementById('monitor-content');
const scoreText = document.getElementById('score');
const livesText = document.getElementById('lives');
const timerBar = document.getElementById('timer-bar');
const btnAllow = document.getElementById('btn-allow');
const btnAlarm = document.getElementById('btn-alarm');
const btnNext = document.getElementById('btn-next');
const overlay = document.getElementById('screamer-overlay');
const screamerImg = document.getElementById('screamer-image');

document.body.addEventListener('click', function() {
    if (!audioStarted) {
        initAudio();
        nextVisitor();
    }
});

function startTimer() {
    clearInterval(timerInterval);
    timeLeft = 100;
    timerBar.style.width = "100%";
    timerBar.style.backgroundColor = "#00ff00";
    
    // С ростом очков время уменьшается (но не меньше 2.5 секунд)
    let currentLimit = Math.max(2500, baseTime - (score * 300)); 
    let step = 100 / (currentLimit / 100);

    timerInterval = setInterval(() => {
        if (isPaused || gameOver) return;
        timeLeft -= step;
        timerBar.style.width = timeLeft + "%";

        if(timeLeft < 40) timerBar.style.backgroundColor = "#ffaa00";
        if(timeLeft < 20) timerBar.style.backgroundColor = "#ff0000";

        if (timeLeft <= 0) {
            clearInterval(timerInterval);
            triggerTimeoutScreamer();
        }
    }, 100);
}

function triggerTimeoutScreamer() {
    executeScreamer("ВРЕМЯ ИСТЕКЛО! Медлительность позволила существу взломать замок шлюза снаружи!");
}

function nextVisitor() {
    if(gameOver) {
        score = 0;
        lives = 3;
        scoreText.innerText = score;
        livesText.innerText = "★★★";
        gameOver = false;
        overlay.style.display = "none";
        screamerImg.style.display = "none";
        overlay.classList.remove('screamer-active');
    }
    
    monitor.style.backgroundColor = "#111";
    monitor.style.color = "#00ff00";
    btnAllow.style.display = "inline-block";
    btnAlarm.style.display = "inline-block";
    btnNext.style.display = "none";

    // Адаптивная сложность: чем больше очков, тем выше шанс монстра (до 80%)
    let monsterChance = Math.min(0.8, 0.4 + (score * 0.04));
    if (Math.random() < monsterChance) {
        currentVisitor = monsters[Math.floor(Math.random() * monsters.length)];
    } else {
        currentVisitor = generateRandomHuman();
    }

    renderVisitor();
    startTimer();
}

function renderVisitor() {
    monitorContent.innerHTML = `
        <div class="stat-line" style="color:#ff0000; font-weight:bold;">[СКАНИРОВАНИЕ ОБЪЕКТА...]</div>
        <div class="stat-line"><b>Имя:</b> ${currentVisitor.name}</div>
        <div class="stat-line"><b>Глаза:</b> ${currentVisitor.eyes}</div>
        <div class="stat-line"><b>Пульс:</b> ${currentVisitor.pulse}</div>
        <div class="stat-line anomaly-box"><b>Аномалии в файле:</b><br>>> ${currentVisitor.anomaly}</div>
    `;
}

function executeScreamer(msg) {
    gameOver = true;
    clearInterval(timerInterval);
    ambientGain.gain.setValueAtTime(0, audioCtx.currentTime); 
    playHumanScream(); 
    
    overlay.style.display = "flex";
    screamerImg.style.display = "block";
    overlay.classList.add('screamer-active');

    setTimeout(() => {
        overlay.classList.remove('screamer-active');
        overlay.style.display = "none";
        screamerImg.style.display = "none";
        
        monitor.style.backgroundColor = "#300";
        monitor.style.color = "#fff";
        monitorContent.innerHTML = `
            <div class="stat-line" style="color: #ff0000; font-size: 20px; font-weight: bold; text-align:center;">КРИТИЧЕСКИЙ СБОЙ СИСТЕМЫ</div><br>
            <div class="stat-line" style="color: #ffcc00; background: #000; padding: 10px; border: 1px solid #ff0000;"><b>ПЛОХАЯ КОНЦОВКА:</b> ${msg}</div>
        `;
        btnNext.innerText = "ПЕРЕЗАГРУЗИТЬ СЕРВЕР ИГРЫ";
        btnNext.style.display = "block";
    }, 1300);
}

function updateLives() {
    lives--;
    let stars = "";
    for(let i=0; i<3; i++) {
        stars += i < lives ? "★" : "☆";
    }
    livesText.innerText = stars;

    if (lives <= 0) {
        executeScreamer("Слишком много ошибок в отчётах. Защитный периметр полностью разрушен подражателями!");
        return true;
    }
    return false;
}

function allowEntry() {
    if (isPaused || gameOver) return;
    clearInterval(timerInterval);
    btnAllow.style.display = "none";
    btnAlarm.style.display = "none";
    
    if (currentVisitor.isMonster) {
        executeScreamer(currentVisitor.scaryMsg);
    } else {
        score++;
        scoreText.innerText = score;
        monitor.style.backgroundColor = "#002200";
        monitorContent.innerHTML = `<br><div class="stat-line" style="text-align:center; font-size: 18px; color:#00ff00;">Объект допущен. Чистый гражданин.</div>`;
        btnNext.style.display = "block";
    }
}

function triggerAlarm() {
    if (isPaused || gameOver) return;
    clearInterval(timerInterval);
    btnAllow.style.display = "none";
    btnAlarm.style.display = "none";

    if (currentVisitor.isMonster) {
        score++;
        scoreText.innerText = score;
        monitor.style.backgroundColor = "#002200";
        monitorContent.innerHTML = `<br><div class="stat-line" style="text-align:center; font-size: 18px; color: #00ff00; font-weight: bold;">УГРОЗА УНИЧТОЖЕНА.<br>Подражатель стерт из системы.</div>`;
        btnNext.style.display = "block";
    } else {
        monitor.style.backgroundColor = "#332200";
        monitorContent.innerHTML = `<br><div class="stat-line" style="text-align:center; font-size: 18px; color:#ffaa00;">ОШИБКА! Вы ликвидировали мирного гражданина!</div>`;
        if (!updateLives()) {
            btnNext.style.display = "block";
        }
    }
}

function togglePause() {
    if (gameOver || !audioStarted) return;
    isPaused = !isPaused;
    if (isPaused) {
        ambientGain.gain.setValueAtTime(0, audioCtx.currentTime);
        monitorContent.innerHTML = `<div style="text-align:center; font-size: 22px; padding-top:40px; color:#ff9900;">СИСТЕМА НА ПАУЗЕ</div>`;
        btnAllow.style.display = "none";
        btnAlarm.style.display = "none";
    } else {
        ambientGain.gain.setValueAtTime(0.2, audioCtx.currentTime);
        btnAllow.style.display = "inline-block";
        btnAlarm.style.display = "inline-block";
        renderVisitor();
    }
}
</script>

</body>
</html>
