<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ОКП: Отдел Контроля Подражателей - ХАРДКОР v2.0</title>
    <style>
        body {
            background-color: #030303;
            color: #00ff00;
            font-family: 'Courier New', Courier, monospace;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
            overflow: hidden;
            user-select: none;
        }

        #game-container {
            width: 90%;
            max-width: 550px;
            background-color: #0d0d0d;
            border: 3px solid #ff0000;
            padding: 25px;
            box-shadow: 0 0 30px rgba(255, 0, 0, 0.3);
            text-align: center;
            border-radius: 8px;
            position: relative;
            z-index: 2;
        }

        #pause-btn {
            position: absolute;
            top: 15px;
            right: 15px;
            background-color: #222;
            padding: 5px 10px;
            font-size: 12px;
            border: 1px solid #ff0000;
            color: #ff0000;
            cursor: pointer;
            z-index: 10;
        }

        h1 {
            color: #ff0000;
            font-size: 24px;
            margin-top: 0;
            letter-spacing: 3px;
            text-shadow: 0 0 8px rgba(255, 0, 0, 0.9);
        }

        #ui-box {
            display: flex;
            justify-content: space-between;
            color: #aaa;
            font-size: 14px;
            margin-bottom: 10px;
        }

        #lives-box {
            color: #ff0000;
            font-weight: bold;
        }

        #timer-container {
            width: 100%;
            height: 8px;
            background-color: #222;
            margin-bottom: 15px;
            border-radius: 4px;
            overflow: hidden;
            border: 1px solid #333;
        }

        #timer-bar {
            width: 100%;
            height: 100%;
            background-color: #00ff00;
            box-shadow: 0 0 10px #00ff00;
        }

        #monitor {
            background-color: #111;
            border: 2px solid #ff0000;
            padding: 20px;
            min-height: 220px;
            text-align: left;
            margin: 15px 0;
            border-radius: 5px;
            box-shadow: inset 0 0 15px #000;
            box-sizing: border-box;
        }

        .stat-line {
            margin: 8px 0;
            font-size: 16px;
            line-height: 1.4;
        }

        .anomaly-box {
            color: #ffaa00;
            margin-top: 15px;
            border-top: 1px dashed #ff0000;
            padding-top: 10px;
        }

        .btn-group {
            display: flex;
            justify-content: space-around;
            margin-top: 20px;
        }

        button.game-btn {
            font-family: 'Courier New', Courier, monospace;
            font-size: 16px;
            font-weight: bold;
            padding: 12px 24px;
            border: 1px solid #ff0000;
            cursor: pointer;
            border-radius: 4px;
            color: white;
            text-shadow: 0 0 5px #000;
        }

        #btn-allow { background-color: #004400; box-shadow: 0 0 10px rgba(0,255,0,0.2); }
        #btn-allow:hover { background-color: #006600; }

        #btn-alarm { background-color: #440000; box-shadow: 0 0 10px rgba(255,0,0,0.2); }
        #btn-alarm:hover { background-color: #660000; }

        #btn-next {
            background-color: #222;
            margin-top: 15px;
            width: 100%;
            border: 1px solid #555;
        }
        #btn-next:hover { background-color: #333; }

        /* ПОЛНОЭКРАННЫЙ СКРИМЕР С ЖУТКИМ ЛИЦОМ */
        #screamer-overlay {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100vw;
            height: 100vh;
            background-color: #000;
            z-index: 9999;
            justify-content: center;
            align-items: center;
            overflow: hidden;
        }

        #screamer-svg {
            width: 100%;
            height: 100%;
            max-width: 800px;
            max-height: 800px;
            display: none;
        }

        .screamer-active {
            animation: hard-shake 0.015s infinite, flash-screen 0.03s infinite, zoom-in 0.5s forwards;
        }

        @keyframes hard-shake {
            0% { transform: translate(30px, 25px) scale(1.3); filter: contrast(3) brightness(1.5); }
            50% { transform: translate(-30px, -25px) scale(0.95) invert(1); filter: hue-rotate(180deg); }
            100% { transform: translate(25px, -30px) scale(1.4); filter: contrast(4) saturate(3); }
        }

        @keyframes flash-screen {
            0%, 100% { background-color: #000; }
            50% { background-color: #200; }
        }

        @keyframes zoom-in {
            0% { transform: scale(0.6); }
            100% { transform: scale(2.5); }
        }
    </style>
</head>

</div>

<div id="game-container">
    <button id="pause-btn" onclick="togglePause()">ПАУЗА</button>
    <h1>РЕЖИМ: ЧИСТКА СИСТЕМЫ</h1>
    
    <div id="ui-box">
        <div>Успешно проверено: <span id="score" style="color:#00ff00; font-weight:bold;">0</span></div>
        <div id="lives-box">ЦЕЛОСТНОСТЬ: <span id="lives">★★★</span></div>

    <div id="monitor">

        <button id="btn-allow" class="game-btn" onclick="allowEntry()" style="display:none;">ВПУСТИТЬ</button>

<script>

// БАЗА ДАННЫХ МОНСТРОВ / ПОДРАЖАТЕЛЕЙ
const monsters = [
    {

let score = 0;
let lives = 3;
let currentVisitor = null;
let gameOver = false;
let isPaused = false;
let audioStarted = false;

let audioCtx = null;
let ambientOsc = null;
let ambientGain = null;

let timeLeft = 100;
let timerInterval = null;
let baseTime = 7000; // 7 секунд на размышление

function initAudio() {
    if (audioStarted) return;
    try {
        audioCtx = new (window.AudioContext || window.webkitAudioContext)();
        
        ambientOsc = audioCtx.createOscillator();
        ambientGain = audioCtx.createGain();
        ambientOsc.type = 'sawtooth'; 
        ambientOsc.frequency.setValueAtTime(38, audioCtx.currentTime); 
        
        let filter = audioCtx.createBiquadFilter();
        filter.type = 'lowpass';
        filter.frequency.setValueAtTime(90, audioCtx.currentTime);

        ambientGain.gain.setValueAtTime(0.18, audioCtx.currentTime);
        
        ambientOsc.connect(filter);
        filter.connect(ambientGain);
        ambientGain.connect(audioCtx.destination);
        ambientOsc.start();
        audioStarted = true;
    } catch(e) { console.log("Аудио не поддерживается браузером"); }
}

function playRealHumanScream() {
    if (!audioCtx) return;
    
    let duration = 1.5;
    let sampleRate = audioCtx.sampleRate;
    let bufferSize = sampleRate * duration;
    let buffer = audioCtx.createBuffer(1, bufferSize, sampleRate);
    let data = buffer.getChannelData(0);

    // Синтезируем истошный крик: модулируемая волна + жесткий шумовой хрип
    for (let i = 0; i < bufferSize; i++) {
        let t = i / sampleRate;
        let noise = Math.random() * 2 - 1;
        
        // Основа крика: синусоида, резко уходящая вверх по частоте (эффект панического визга)
        let freqMod = 250 + (t * 800) + Math.sin(2 * Math.PI * 70 * t) * 120;
        let vocalWave = Math.sin(2 * Math.PI * freqMod * t);
        
        // Хрип связок и модуляция
        let throatDistortion = Math.sin(2 * Math.PI * 45 * t);
        
        data[i] = (vocalWave * 0.35) + (noise * 0.55) + (throatDistortion * 0.1);
    }

    let source = audioCtx.createBufferSource();
    source.buffer = buffer;

    // Резонансный полосовой фильтр для имитации крика в замкнутом коридоре
    let filter = audioCtx.createBiquadFilter();
    filter.type = 'bandpass';
    filter.Q.setValueAtTime(3, audioCtx.currentTime);
    filter.frequency.setValueAtTime(1300, audioCtx.currentTime);
    filter.frequency.exponentialRampToValueAtTime(500, audioCtx.currentTime + duration);

    // Дисторшн (перегрузка) для эффекта разрыва динамиков
    let distortion = audioCtx.createWaveShaper();
    let curve = new Float32Array(44100);
    for (let i=0; i<44100; ++i) {
        let x = (i * 2) / 44100 - 1;
        curve[i] = (3 + 200) * x * 15 * (Math.PI/180) / (Math.PI + 200 * Math.abs(x));
    }
    distortion.curve = curve;

    let gain = audioCtx.createGain();
    gain.gain.setValueAtTime(1.6, audioCtx.currentTime); // Очень громко
    gain.gain.exponentialRampToValueAtTime(0.001, audioCtx.currentTime + duration);

    source.connect(filter);
    filter.connect(distortion);
    distortion.connect(gain);
    gain.connect(audioCtx.destination);
    source.start();
}

const monitor = document.getElementById('monitor');
const monitorContent = document.getElementById('monitor-content');
const scoreText = document.getElementById('score');
const livesText = document.getElementById('lives');
const timerBar = document.getElementById('timer-bar');
const btnAllow = document.getElementById('btn-allow');
const btnAlarm = document.getElementById('btn-alarm');
const btnNext = document.getElementById('btn-next');
const overlay = document.getElementById('screamer-overlay');
const screamerSvg = document.getElementById('screamer-svg');

function startGame() {
    if (!audioStarted) {
        initAudio();
        nextVisitor();
    }
}

function startTimer() {
    clearInterval(timerInterval);
    timeLeft = 100;
    timerBar.style.width = "100%";
    timerBar.style.backgroundColor = "#00ff00";
    
    // С ростом очков время уменьшается, доходя до жестких 2.2 секунд
    let currentLimit = Math.max(2200, baseTime - (score * 400)); 
    let step = 100 / (currentLimit / 50);

    timerInterval = setInterval(() => {
        if (isPaused || gameOver) return;
        timeLeft -= step;
        if (timeLeft < 0) timeLeft = 0;
        
        timerBar.style.width = timeLeft + "%";

        if(timeLeft < 50) timerBar.style.backgroundColor = "#ffaa00";
        if(timeLeft < 25) timerBar.style.backgroundColor = "#ff0000";

        if (timeLeft <= 0) {
            clearInterval(timerInterval);
            executeScreamer("ВРЕМЯ ИСТЕКЛО! Твоя медлительность позволила подражателю выбить защитную дверь шлюза!");
        }
    }, 50);
}

function nextVisitor() {
    if(gameOver) {
        score = 0;
        lives = 3;
        scoreText.innerText = score;
        livesText.innerText = "★★★";
        gameOver = false;
        overlay.style.display = "none";
        screamerSvg.style.display = "none";
        overlay.classList.remove('screamer-active');
    }
    
    // Сброс стилей монитора
    monitor.style.backgroundColor = "#111";
    monitor.style.color = "#00ff00";
    
    // Включаем основные кнопки управления
    btnAllow.style.display = "inline-block";
    btnAllow.disabled = false;
    btnAlarm.style.display = "inline-block";
    btnAlarm.disabled = false;
    btnNext.style.display = "none";

    // Шанс спавна монстра растет с уровнем счета
    let monsterChance = Math.min(0.75, 0.35 + (score * 0.05));
    if (Math.random() < monsterChance) {
        currentVisitor = monsters[Math.floor(Math.random() * monsters.length)];
    } else {
        currentVisitor = humans[Math.floor(Math.random() * humans.length)];
    }

    renderVisitor();
    startTimer();
}

function renderVisitor() {
    monitorContent.innerHTML = `
        <div class="stat-line" style="color:#ff0000; font-weight:bold;">[ПРОТОКОЛ СКАНИРОВАНИЯ ОБЪЕКТА]</div><br>
        <div class="stat-line"><b>Имя:</b> ${currentVisitor.name}</div>
        <div class="stat-line"><b>Глаза:</b> ${currentVisitor.eyes}</div>
        <div class="stat-line"><b>Пульс:</b> ${currentVisitor.pulse}</div>
        <div class="stat-line anomaly-box"><b>Аномалии в структуре файла:</b><br>>> ${currentVisitor.anomaly}</div>
    `;
}

function executeScreamer(msg) {
    gameOver = true;
    clearInterval(timerInterval);
    
    // Выключаем эмбиент, прячем интерфейс
    if (ambientGain && audioCtx) ambientGain.gain.setValueAtTime(0, audioCtx.currentTime); 
    btnAllow.style.display = "none";
    btnAlarm.style.display = "none";
    
    // Включаем дикий крик и рожу
    playRealHumanScream(); 
    overlay.style.display = "flex";
    screamerSvg.style.display = "block";
    overlay.classList.add('screamer-active');

    // Через 1.4 секунды выводим экран проигрыша
    setTimeout(() => {
        overlay.classList.remove('screamer-active');
        overlay.style.display = "none";
        screamerSvg.style.display = "none";
        
        monitor.style.backgroundColor = "#300";
        monitor.style.color = "#fff";
        monitorContent.innerHTML = `
            <div class="stat-line" style="color: #ff0000; font-size: 20px; font-weight: bold; text-align:center;">СИСТЕМА УНИЧТОЖЕНА</div><br>
            <div class="stat-line" style="color: #ffcc00; background: #000; padding: 10px; border: 1px solid #ff0000;"><b>ПЛОХАЯ КОНЦОВКА:</b><br>${msg}</div>
        `;
        btnNext.innerText = "ПЕРЕЗАГРУЗИТЬ СЕРВЕР ТЕРМИНАЛА";
        btnNext.style.display = "block";
    }, 1400);
}

function updateLives() {
    lives--;
    let stars = "";
    for(let i=0; i<3; i++) {
        stars += i < lives ? "★" : "☆";
    }
    livesText.innerText = stars;

    if (lives <= 0) {
        executeScreamer("Вы допустили слишком много критических ошибок в отчетах. Пост полностью захвачен тварями!");
        return true;
    }
    return false;
}

function allowEntry() {
    if (isPaused || gameOver) return;
    clearInterval(timerInterval);
    
    // МГНОВЕННО прячем кнопки, чтобы исключить баги двойного клика
    btnAllow.style.display = "none";
    btnAlarm.style.display = "none";
    
    if (currentVisitor.isMonster) {
        executeScreamer(currentVisitor.scaryMsg);
    } else {
        score++;
        scoreText.innerText = score;
        monitor.style.backgroundColor = "#002200";
        monitorContent.innerHTML = `<br><br><div class="stat-line" style="text-align:center; font-size: 18px; color:#00ff00; font-weight:bold;">ОБЪЕКТ ПРОПУЩЕН.<br>Гражданин в безопасности.</div>`;
        btnNext.innerText = "ЗАГРУЗИТЬ СЛЕДУЮЩИЙ ОБЪЕКТ";
        btnNext.style.display = "block";
    }
}

function triggerAlarm() {
    if (isPaused || gameOver) return;
    clearInterval(timerInterval);
    
    // МГНОВЕННО прячем кнопки
    btnAllow.style.display = "none";
    btnAlarm.style.display = "none";

    if (currentVisitor.isMonster) {
        score++;
        scoreText.innerText = score;
        monitor.style.backgroundColor = "#002200";
        monitorContent.innerHTML = `<br><br><div class="stat-line" style="text-align:center; font-size: 18px; color: #00ff00; font-weight: bold;">УГРОЗА УНИЧТОЖЕНА.<br>Подражатель выжжен из шлюза.</div>`;
        btnNext.innerText = "ЗАГРУЗИТЬ СЛЕДУЮЩИЙ ОБЪЕКТ";
        btnNext.style.display = "block";
    } else {
        monitor.style.backgroundColor = "#332200";
        monitor.style.color = "#ffaa00";
        monitorContent.innerHTML = `<br><br><div class="stat-line" style="text-align:center; font-size: 18px; font-weight: bold;">ОШИБКА ДЕПАРТАМЕНТА!<br>Вы ликвидировали невиновного человека. Списан штраф.</div>`;
        
        if (!updateLives()) {
            btnNext.innerText = "ЗАГРУЗИТЬ СЛЕДУЮЩИЙ ОБЪЕКТ";
            btnNext.style.display = "block";
        }
    }
}

function togglePause() {
    if (gameOver || !audioStarted) return;
    
    isPaused = !isPaused;
    
    if (isPaused) {
        clearInterval(timerInterval);
        if (ambientGain && audioCtx) ambientGain.gain.setValueAtTime(0, audioCtx.currentTime);
        
        // Замораживаем интерфейс, прячем рабочие кнопки
        monitorContent.innerHTML = `<div style="text-align:center; font-size: 22px; padding-top:50px; color:#ff9900; font-weight:bold; letter-spacing:2px;">СИСТЕМА НА ПАУЗЕ</div>`;
        btnAllow.style.display = "none";
        btnAlarm.style.display = "none";
        document.getElementById('pause-btn').innerText = "ПРОДОЛЖИТЬ";
    } else {
        if (ambientGain && audioCtx) ambientGain.gain.setValueAtTime(0.18, audioCtx.currentTime);
        document.getElementById('pause-btn').innerText = "ПАУЗА";
        
        // Возвращаем кнопки и данные
        btnAllow.style.display = "inline-block";
        btnAlarm.style.display = "inline-block";
        renderVisitor();
        startTimer(); // Возобновляем таймер с текущего момента
    }
}
</script>
