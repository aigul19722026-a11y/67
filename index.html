<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ОКП: Отдел Контроля Подражателей - ANALOG HORROR</title>
    <style>
        body {
            background-color: #020202;
            color: #00ff00;
            font-family: 'Courier New', Courier, monospace;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
            overflow: hidden;
            user-select: none;
        }

        /* ЭФФЕКТ СТАРОВАТО КИНЕСКОПА И СКАНИРУЮЩИХ ЛИНИЙ */
        .crt-screen {
            position: relative;
            width: 100%;
            max-width: 550px;
            padding: 25px;
            background-color: #080a08;
            border: 4px solid #3a3a3a;
            border-radius: 25px;
            box-shadow: inset 0 0 40px rgba(0,0,0,1), 0 0 30px rgba(0, 255, 0, 0.15);
            overflow: hidden;
        }

        /* Сканирующие полосы телика */
        .crt-screen::before {
            content: " ";
            display: block;
            position: absolute;
            top: 0; left: 0; bottom: 0; right: 0;
            background: linear-gradient(rgba(18, 16, 16, 0) 50%, rgba(0, 0, 0, 0.35) 50%), linear-gradient(90deg, rgba(255, 0, 0, 0.05), rgba(0, 255, 0, 0.02), rgba(0, 0, 255, 0.05));
            z-index: 20;
            background-size: 100% 4px, 6px 100%;
            pointer-events: none;
        }

        /* Легкое мерцание старого люминофора */
        .crt-flicker {
            animation: crt-glow 0.15s infinite;
        }

        @keyframes crt-glow {
            0% { opacity: 0.98; }
            50% { opacity: 1; }
            100% { opacity: 0.99; }
        }

        #game-container {
            position: relative;
            z-index: 5;
            text-align: center;
        }

        #pause-btn {
            position: absolute;
            top: 15px;
            right: 15px;
            background-color: #111;
            padding: 5px 10px;
            font-size: 12px;
            border: 1px solid #00ff00;
            color: #00ff00;
            cursor: pointer;
            z-index: 30;
        }

        h1 {
            color: #ff0000;
            font-size: 22px;
            margin-top: 0;
            letter-spacing: 4px;
            text-shadow: 0 0 5px #ff0000;
        }

        #ui-box {
            display: flex;
            justify-content: space-between;
            color: #88fa88;
            font-size: 14px;
            margin-bottom: 10px;
        }

        #timer-container {
            width: 100%;
            height: 6px;
            background-color: #051105;
            margin-bottom: 15px;
            border-radius: 2px;
            overflow: hidden;
            border: 1px solid #004400;
        }

        #timer-bar {
            width: 100%;
            height: 100%;
            background-color: #00ff00;
            box-shadow: 0 0 8px #00ff00;
        }

        #monitor {
            background-color: #030503;
            border: 2px solid #00aa00;
            padding: 20px;
            min-height: 220px;
            text-align: left;
            margin: 15px 0;
            border-radius: 10px;
            box-shadow: inset 0 0 20px #000;
            transition: background-color 0.1s ease, opacity 0.05s ease;
        }

        .stat-line {
            margin: 8px 0;
            font-size: 15px;
            line-height: 1.4;
            text-shadow: 0 0 3px #00ff00;
        }

        .anomaly-box {
            color: #ffaa00;
            margin-top: 15px;
            border-top: 1px dashed #00aa00;
            padding-top: 10px;
            text-shadow: 0 0 3px #ffaa00;
        }

        .btn-group {
            display: flex;
            justify-content: space-around;
            margin-top: 20px;
        }

        /* ТАКТИЛЬНЫЕ КНОПКИ С АНИМАЦИЕЙ НАЖАТИЯ */
        button.game-btn {
            font-family: 'Courier New', Courier, monospace;
            font-size: 15px;
            font-weight: bold;
            padding: 12px 26px;
            border: 2px solid #333;
            cursor: pointer;
            border-radius: 6px;
            color: white;
            transition: transform 0.05s, box-shadow 0.05s;
            position: relative;
        }

        button.game-btn:active {
            transform: scale(0.92);
        }

        #btn-allow { 
            background-color: #005500; 
            border-color: #00ff00;
            box-shadow: 0 4px 0 #003300, 0 0 10px rgba(0,255,0,0.3); 
        }
        #btn-allow:active {
            box-shadow: 0 1px 0 #003300;
        }

        #btn-alarm { 
            background-color: #550000; 
            border-color: #ff0000;
            box-shadow: 0 4px 0 #330000, 0 0 10px rgba(255,0,0,0.3); 
        }
        #btn-alarm:active {
            box-shadow: 0 1px 0 #330000;
        }

        #btn-next {
            background-color: #222;
            margin-top: 15px;
            width: 100%;
            border: 1px solid #555;
        }

        /* ПОЛНОЭКРАННЫЙ СКРИМЕР */
        #screamer-overlay {
            display: none;
            position: fixed;
            top: 0; left: 0; width: 100vw; height: 100vh;
            background-color: #000;
            z-index: 9999;
            justify-content: center; align-items: center;
            overflow: hidden;
        }

        #screamer-svg {
            width: 100%; height: 100%;
            max-width: 800px; max-height: 800px;
            display: none;
        }

        .screamer-active {
            animation: hard-shake 0.015s infinite, flash-screen 0.03s infinite, zoom-in 0.5s forwards;
        }

        @keyframes hard-shake {
            0% { transform: translate(25px, 20px) scale(1.3); filter: contrast(3) brightness(1.4); }
            50% { transform: translate(-25px, -20px) scale(0.95) invert(1); filter: hue-rotate(180deg); }
            100% { transform: translate(20px, -25px) scale(1.4); filter: contrast(4) saturate(3); }
        }

        @keyframes flash-screen {
            0%, 100% { background-color: #000; }
            50% { background-color: #2a0000; }
        }

        @keyframes zoom-in {
            0% { transform: scale(0.6); }
            100% { transform: scale(2.3); }
        }
    </style>
</head>
<body>

<div class="crt-screen crt-flicker">
    <div id="game-container">
        <button id="pause-btn" onclick="togglePause()">ПАУЗА</button>
        <h1>АНАЛОГОВЫЙ ТЕРМИНАЛ ОКП</h1>
        
        <div id="ui-box">
            <div>УСПЕШНО: <span id="score" style="color:#00ff00; font-weight:bold;">0</span></div>

                [ НАЖМИТЕ НА ЭКРАН ДЛЯ ПОДКЛЮЧЕНИЯ К КИНЕСКОПУ ОБЪЕКТА ]

<script>
const humans = [
    { name: "Алексей", eyes: "Карие, обычные", pulse: "74 уд/мин", anomaly: "Нет. Гражданин вернулся со смены в блоке очистки воды." },
    { name: "Елена", eyes: "Зеленые, ясные", pulse: "81 уд/мин", anomaly: "Нет. Жалуется на едкий запах гари на внешнем периметре." },
    { name: "Михаил", eyes: "Голубые, уставшие", pulse: "70 уд/мин", anomaly: "Нет. Шахтер, документы покрыты угольной пылью." },
    { name: "Ольга", eyes: "Серые, испуганные", pulse: "92 уд/мин", anomaly: "Нет. Слышала странный скрежет за стеной своего сектора." },
    { name: "Иван", eyes: "Карие, обычные", pulse: "65 уд/мин", anomaly: "Нет. Прибыл для передачи дежурного журнала смены." }
];

const monsters = [
    { 
        name: "txt.Dmitriy.copy", 
        eyes: "ОТСУТСТВУЮТ (ГЛУБОКАЯ ПУСТОТА)", 
        pulse: "⚠️ ОШИБКА ДЕШИФРАТОРА", 
        anomaly: "Возраст по логам: 12930897 лет. ФАЙЛ-ПРИЗРАК. Сигналы сканера ломаются об объект.", 
        isMonster: true, 
        scaryMsg: "Древний вирус кода txt.Dmitriy.copy стёр матрицу твоей личности. Ему было 12930897 лет... Скрипт закрыт." 
    },
    { 
        name: "Михаил", 
        eyes: "Полностью черные", 
        pulse: "0 уд/мин", 
        anomaly: "Температура тела: 4°C. Лицо деформировано в застывшей мертвой улыбке.", 
        isMonster: true, 
        scaryMsg: "Подражатель Михаил проник на пост. Он сорвал защитную маску терминала вместе с твоей головой." 
    },
    { 
        name: "Святослав", 
        eyes: "Стеклянные, не двигаются", 
        pulse: "14 уд/мин (сбои)", 
        anomaly: "ХАРДКОР: Под одеждой прощупываются множественные суставчатые конечности насекомого.", 
        isMonster: true, 
        scaryMsg: "Из Святослава вырвался гигантский инсектоид, отложив личинки прямо в системы охлаждения терминала." 
    },
    { 
        name: "Анна", 
        eyes: "Человеческие", 
        pulse: "145 уд/мин", 
        anomaly: "ХАРДКОР: Сканер ДНК выявил, что объект состоит из биомассы 4 разных людей. Документы чистые.", 
        isMonster: true, 
        scaryMsg: "Морф Анна разделился на четыре части прямо внутри бункера, устроив резню на нижних этажах." 
    }
];

let score = 0;
let lives = 3;
let currentVisitor = null;
let gameOver = false;
let isPaused = false;
let audioStarted = false;

let audioCtx = null;
let ambientGain = null;

let timeLeft = 100;
let timerInterval = null;
let baseTime = 7000; 

function initAudio() {
    if (audioStarted) return;
    try {
        audioCtx = new (window.AudioContext || window.webkitAudioContext)();
        
        let ambientOsc = audioCtx.createOscillator();
        ambientGain = audioCtx.createGain();
        ambientOsc.type = 'sawtooth'; 
        ambientOsc.frequency.setValueAtTime(32, audioCtx.currentTime); 
        
        let filter = audioCtx.createBiquadFilter();
        filter.type = 'lowpass';
        filter.frequency.setValueAtTime(80, audioCtx.currentTime);

        ambientGain.gain.setValueAtTime(0.15, audioCtx.currentTime);
        
        ambientOsc.connect(filter);
        filter.connect(ambientGain);
        ambientGain.connect(audioCtx.destination);
        ambientOsc.start();
        audioStarted = true;
    } catch(e) { console.log(e); }
}

// ЗВУК ГАЛОЧКИ (ЗЕЛЕНЫЙ КЛИК)
function playCheckmarkSound() {
    if (!audioCtx) return;
    let osc = audioCtx.createOscillator();
    let gain = audioCtx.createGain();
    
    osc.type = 'sine';
    osc.frequency.setValueAtTime(550, audioCtx.currentTime);
    osc.frequency.exponentialRampToValueAtTime(880, audioCtx.currentTime + 0.1);
    
    gain.gain.setValueAtTime(0.2, audioCtx.currentTime);
    gain.gain.exponentialRampToValueAtTime(0.001, audioCtx.currentTime + 0.15);
    
    osc.connect(gain);
    gain.connect(audioCtx.destination);
    osc.start();
    osc.stop(audioCtx.currentTime + 0.15);
}

// РЕАЛИСТИЧНЫЙ СИНТЕЗИРОВАННЫЙ ВЫСТРЕЛ ИЗ ДРОБОВИКА С ЭХОМ
function playShotgunSound() {
    if (!audioCtx) return;
    let duration = 0.8;
    let sampleRate = audioCtx.sampleRate;
    let bufferSize = sampleRate * duration;
    let buffer = audioCtx.createBuffer(1, bufferSize, sampleRate);
    let data = buffer.getChannelData(0);

    for (let i = 0; i < bufferSize; i++) {
        let t = i / sampleRate;
        let noise = Math.random() * 2 - 1;
        // Хлёсткий взрывной импульс, переходящий в низкочастотный гул (эхо)
        let explosion = Math.exp(-9 * t); 
        data[i] = noise * explosion;
    }

    let noiseNode = audioCtx.createBufferSource();
    noiseNode.buffer = buffer;

    let filter = audioCtx.createBiquadFilter();
    filter.type = 'lowpass';
    filter.frequency.setValueAtTime(1000, audioCtx.currentTime);
    filter.frequency.linearRampToValueAtTime(200, audioCtx.currentTime + duration);

    let gain = audioCtx.createGain();
    gain.gain.setValueAtTime(1.8, audioCtx.currentTime); // Очень мощно
    gain.gain.exponentialRampToValueAtTime(0.001, audioCtx.currentTime + duration);

    noiseNode.connect(filter);
    filter.connect(gain);
    gain.connect(audioCtx.destination);
    noiseNode.start();
}

// ЧЕЛОвеЧЕСКИЙ ИСТОШНЫЙ КРИК (ДЛЯ СКРИМЕРА)
function playRealHumanScream() {
    if (!audioCtx) return;
    let duration = 1.5;
    let sampleRate = audioCtx.sampleRate;
    let bufferSize = sampleRate * duration;
    let buffer = audioCtx.createBuffer(1, bufferSize, sampleRate);
    let data = buffer.getChannelData(0);

    for (let i = 0; i < bufferSize; i++) {
        let t = i / sampleRate;
        let noise = Math.random() * 2 - 1;
        let freqMod = 280 + (t * 750) + Math.sin(2 * Math.PI * 65 * t) * 140;
        let vocalWave = Math.sin(2 * Math.PI * freqMod * t);
        let throatDistortion = Math.sin(2 * Math.PI * 50 * t);
        data[i] = (vocalWave * 0.3) + (noise * 0.6) + (throatDistortion * 0.1);
    }

    let source = audioCtx.createBufferSource();
    source.buffer = buffer;

    let filter = audioCtx.createBiquadFilter();
    filter.type = 'bandpass';
    filter.Q.setValueAtTime(3.5, audioCtx.currentTime);
    filter.frequency.setValueAtTime(1400, audioCtx.currentTime);
    filter.frequency.exponentialRampToValueAtTime(450, audioCtx.currentTime + duration);

    let distortion = audioCtx.createWaveShaper();
    let curve = new Float32Array(44100);
    for (let i=0; i<44100; ++i) {
        let x = (i * 2) / 44100 - 1;
        curve[i] = (3 + 220) * x * 15 * (Math.PI/180) / (Math.PI + 220 * Math.abs(x));
    }
    distortion.curve = curve;

    let gain = audioCtx.createGain();
    gain.gain.setValueAtTime(1.6, audioCtx.currentTime);
    gain.gain.exponentialRampToValueAtTime(0.001, audioCtx.currentTime + duration);

    source.connect(filter);
    filter.connect(distortion);
    distortion.connect(gain);
    gain.connect(audioCtx.destination);
    source.start();
}

const monitor = document.getElementById('monitor');
const monitorContent = document.getElementById('monitor-content');
const scoreText = document.getElementById('score');
const livesText = document.getElementById('lives');
const timerBar = document.getElementById('timer-bar');
const btnAllow = document.getElementById('btn-allow');
const btnAlarm = document.getElementById('btn-alarm');
const btnNext = document.getElementById('btn-next');
const overlay = document.getElementById('screamer-overlay');
const screamerSvg = document.getElementById('screamer-svg');

function startGame() {
    if (!audioStarted) {
        initAudio();
        nextVisitor();
    }
}

function startTimer() {
    clearInterval(timerInterval);
    timeLeft = 100;
    timerBar.style.width = "100%";
    timerBar.style.backgroundColor = "#00ff00";
    
    let currentLimit = Math.max(2000, baseTime - (score * 450)); 
    let step = 100 / (currentLimit / 40);

    timerInterval = setInterval(() => {
        if (isPaused || gameOver) return;
        timeLeft -= step;
        if (timeLeft < 0) timeLeft = 0;
        timerBar.style.width = timeLeft + "%";

        if(timeLeft < 50) timerBar.style.backgroundColor = "#ffaa00";
        if(timeLeft < 25) timerBar.style.backgroundColor = "#ff0000";

        if (timeLeft <= 0) {
            clearInterval(timerInterval);
            executeScreamer("ВРЕМЯ ИСТЕКЛО! Объект воспользовался задержкой шлюза и пробил стекло консоли!");
        }
    }, 40);
}

function nextVisitor() {
    if(gameOver) {
        score = 0;
        lives = 3;
        scoreText.innerText = score;
        livesText.innerText = "★★★";
        gameOver = false;
        overlay.style.display = "none";
        screamerSvg.style.display = "none";
        overlay.classList.remove('screamer-active');
    }
    
    monitor.style.backgroundColor = "#030503";
    monitor.style.color = "#00ff00";
    monitor.style.opacity = "1";
    
    btnAllow.style.display = "inline-block";
    btnAlarm.style.display = "inline-block";
    btnNext.style.display = "none";

    let monsterChance = Math.min(0.8, 0.35 + (score * 0.06));
    if (Math.random() < monsterChance) {
        currentVisitor = monsters[Math.floor(Math.random() * monsters.length)];
    } else {
        currentVisitor = humans[Math.floor(Math.random() * humans.length)];
    }

    renderVisitor();
    startTimer();
}

function renderVisitor() {
    monitorContent.innerHTML = `
        <div class="stat-line" style="color:#ff3333; font-weight:bold;">[ПРОТОКОЛ ОБСЛЕДОВАНИЯ ОКП]</div><br>
        <div class="stat-line"><b>Имя:</b> ${currentVisitor.name}</div>
        <div class="stat-line"><b>Сетчатка:</b> ${currentVisitor.eyes}</div>
        <div class="stat-line"><b>Пульс:</b> ${currentVisitor.pulse}</div>
        <div class="stat-line anomaly-box"><b>Аномалии кинескопа:</b><br>>> ${currentVisitor.anomaly}</div>
    `;
}

function executeScreamer(msg) {
    gameOver = true;
    clearInterval(timerInterval);
    
    if (ambientGain && audioCtx) ambientGain.gain.setValueAtTime(0, audioCtx.currentTime); 
    btnAllow.style.display = "none";
    btnAlarm.style.display = "none";
    
    playRealHumanScream(); 
    overlay.style.display = "flex";
    screamerSvg.style.display = "block";
    overlay.classList.add('screamer-active');

    setTimeout(() => {
        overlay.classList.remove('screamer-active');
        overlay.style.display = "none";
        screamerSvg.style.display = "none";
        
        monitor.style.backgroundColor = "#2a0000";
        monitor.style.color = "#fff";
        monitorContent.innerHTML = `
            <div class="stat-line" style="color: #ff0000; font-size: 18px; font-weight: bold; text-align:center;">СВЯЗЬ С СЕКТОРОМ ПОТЕРЯНА</div><br>
            <div class="stat-line" style="color: #ffcc00; background: #000; padding: 10px; border: 1px solid #ff0000;"><b>КОНЦОВКА АННИГИЛЯЦИИ:</b><br>${msg}</div>
        `;
        btnNext.innerText = "ПЕРЕЗАГРУЗИТЬ КИНЕСКОП ТЕРМИНАЛА";
        btnNext.style.display = "block";
    }, 1450);
}

function updateLives() {
    lives--;
    let stars = "";
    for(let i=0; i<3; i++) {
        stars += i < lives ? "★" : "☆";
    }
    livesText.innerText = stars;

    if (lives <= 0) {
        executeScreamer("Лимит ошибок исчерпан. Подражатели полностью дестабилизировали систему очистки.");
        return true;
    }
    return false;
}

function allowEntry() {
    if (isPaused || gameOver) return;
    clearInterval(timerInterval);
    
    btnAllow.style.display = "none";
    btnAlarm.style.display = "none";
    
    // ЭФФЕКТ ГАЛОЧКИ: звук + короткая зеленая вспышка кинескопа
    playCheckmarkSound();
    monitor.style.backgroundColor = "#003300";
    
    setTimeout(() => {
        if (currentVisitor.isMonster) {
            executeScreamer(currentVisitor.scaryMsg);
        } else {
            score++;
            scoreText.innerText = score;
            monitor.style.backgroundColor = "#031503";
            monitorContent.innerHTML = `<br><br><div class="stat-line" style="text-align:center; font-size: 16px; color:#00ff00; font-weight:bold;">ШЛЮЗ ЗАКРЫТ.<br>Гражданин успешно пропущен внутрь сектора.</div>`;
            btnNext.innerText = "ЗАГРУЗИТЬ СЛЕДУЮЩИЙ ОБЪЕКТ";
            btnNext.style.display = "block";
        }
    }, 150);
}

function triggerAlarm() {
    if (isPaused || gameOver) return;
    clearInterval(timerInterval);
    
    btnAllow.style.display = "none";
    btnAlarm.style.display = "none";

    // ЭФФЕКТ ВЫСТРEЛА: Экран гаснет, играет громкий выстрел дробовика
    playShotgunSound();
    monitor.style.opacity = "0";
    monitor.style.backgroundColor = "#000000";

    setTimeout(() => {
        monitor.style.opacity = "1";
        if (currentVisitor.isMonster) {
            score++;
            scoreText.innerText = score;
            monitor.style.backgroundColor = "#031503";
            monitor.style.color = "#00ff00";
            monitorContent.innerHTML = `<br><br><div class="stat-line" style="text-align:center; font-size: 16px; color: #00ff00; font-weight: bold;">ОБЪЕКТ НЕЙТРАЛИЗОВАН.<br>Угроза выжжена из шлюзовой камеры.</div>`;
            btnNext.innerText = "ЗАГРУЗИТЬ СЛЕДУЮЩИЙ ОБЪЕКТ";
            btnNext.style.display = "block";
        } else {
            monitor.style.backgroundColor = "#221500";
            monitor.style.color = "#ffaa00";
            monitorContent.innerHTML = `<br><br><div class="stat-line" style="text-align:center; font-size: 16px; font-weight: bold;">ОШИБКА РАСЧЁТА ДЕПАРТАМЕНТА!<br>Ликвидирован чистый человек. Наложен штраф.</div>`;
            
            if (!updateLives()) {
                btnNext.innerText = "ЗАГРУЗИТЬ СЛЕДУЮЩИЙ ОБЪЕКТ";
                btnNext.style.display = "block";
            }
        }
    }, 350); // Небольшая задержка темноты после выстрела
}

function togglePause() {
    if (gameOver || !audioStarted) return;
    isPaused = !isPaused;
    
    if (isPaused) {
        clearInterval(timerInterval);
        if (ambientGain && audioCtx) ambientGain.gain.setValueAtTime(0, audioCtx.currentTime);
        monitorContent.innerHTML = `<div style="text-align:center; font-size: 20px; padding-top:55px; color:#ff9900; font-weight:bold; letter-spacing:2px;">КИНЕСКОП НА ПАУЗЕ</div>`;
        btnAllow.style.display = "none";
        btnAlarm.style.display = "none";
        document.getElementById('pause-btn').innerText = "ПРОДОЛЖИТЬ";
    } else {
        if (ambientGain && audioCtx) ambientGain.gain.setValueAtTime(0.15, audioCtx.currentTime);
        document.getElementById('pause-btn').innerText = "ПАУЗА";
        btnAllow.style.display = "inline-block";
        btnAlarm.style.display = "inline-block";
        renderVisitor();
        startTimer();
    }
}
</script>
