<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ТЕРМИНАЛ ОКП-4</title>
    <style>
        body {
            background-color: #050b05;
            color: #00ff00;
            font-family: 'Courier New', Courier, monospace;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
            user-select: none;
        }

        #menu-screen, #game-screen {
            background-color: #000;
            border: 3px solid #00ff00;
            box-shadow: 0 0 20px rgba(0, 255, 0, 0.4);
            padding: 30px;
            width: 650px;
            text-align: center;
            box-sizing: border-box;
            position: relative;
            overflow: hidden;
        }

        #game-screen { display: none; }

        h1, h2 {
            text-shadow: 0 0 5px #00ff00;
            margin-top: 0;
        }

        .btn {
            background: #002200;
            color: #00ff00;
            border: 1px solid #00ff00;
            padding: 12px 20px;
            margin: 10px;
            cursor: pointer;
            font-family: inherit;
            font-weight: bold;
            font-size: 14px;
            transition: all 0.2s;
        }

        .btn:hover:not(:disabled) {
            background: #00ff00;
            color: #000;
            box-shadow: 0 0 10px #00ff00;
        }

        .btn:disabled {
            border-color: #004400;
            color: #004400;
            background: #000;
            cursor: not-allowed;
        }

        #monitor {
            background: #020d02;
            border: 2px solid #004400;
            height: 340px;
            margin: 20px 0;
            padding: 15px;
            text-align: left;
            overflow-y: auto;
            position: relative;
        }

        .stat-line {
            margin-bottom: 8px;
            font-size: 14px;
            line-height: 1.4;
        }

        .anomaly-box {
            border: 1px dashed #00ff00;
            padding: 8px;
            background: #041404;
        }

        #controls {
            display: flex;
            justify-content: space-around;
            flex-wrap: wrap;
        }

        .hud-bar {
            display: flex;
            justify-content: space-between;
            border-bottom: 1px solid #00ff00;
            padding-bottom: 5px;
            margin-bottom: 15px;
            font-size: 12px;
        }

        .flash-red {
            animation: flash 0.3s ease-out;
        }
        @keyframes flash {
            0% { background-color: #ff0000; }
            100% { background-color: #020d02; }
        }

        .screamer-glitch {
            animation: glitch-anim 0.1s infinite;
            background: #1a0000 !important;
        }
        @keyframes glitch-anim {
            0% { transform: translate(2px, 1px) rotate(0deg); }
            50% { transform: translate(-1px, -2px) rotate(1deg); }
            100% { transform: translate(1px, 2px) rotate(-1deg); }
        }

        @keyframes blink {
            0%, 49% { opacity: 1; }
            50%, 100% { opacity: 0; }
        }
        .blinking { animation: blink 1s infinite; }
    </style>
</head>
<body>

    <div id="menu-screen">
        <h1>СИСТЕМА КОНТРОЛЯ ПЕРИМЕТРА</h1>
        <h2>[ОКП-4: ТЕРМИНАЛ ПРОПУСКА]</h2>
        <p style="margin: 30px 0; font-size: 14px; line-height: 1.6;">
            ВНИМАНИЕ! Зафиксирована биологическая угроза «Cryptococcus» и появление сущностей-подражателей.<br><br>
            <span style="color: #ff3333;">Ошибочный пропуск угрозы приведет к гибели сектора.</span>
        </p>
        <button class="btn" onclick="startGame('classic')">КЛАССИЧЕСКИЙ РЕЖИМ</button>
        <button class="btn" onclick="startGame('infinite')">БЕСКОНЕЧНЫЙ РЕЖИМ</button>
    </div>

    <div id="game-screen">
        <div class="hud-bar">
            <span id="hud-mode">Режим: ---</span>
            <span id="hud-score">Обработано: 0/50</span>
            <span id="hud-lives" style="color: #ff5555;">Стабильность шлюза: 100%</span>
        </div>

        <div id="monitor"></div>

        <div id="controls">
            <button class="btn" id="btn-camera" onclick="toggleCamera()">[ ] ВКЛЮЧИТЬ КАМЕРУ</button>
            <button class="btn" id="btn-in" style="border-color: #55ff55;" onclick="processVisitor(true)">ВПУСТИТЬ</button>
            <button class="btn" id="btn-out" style="border-color: #ff5555;" onclick="processVisitor(false)">ОТКАЗАТЬ В ВХОДЕ</button>
            <button class="btn" id="btn-shoot" style="border-color: #ff3333; background: #200;" onclick="shootVisitor()">❌ ЛИКВИДИРОВАТЬ</button>
        </div>
    </div>

    <script>
        // База данных — теперь без лишних папок, ищет файлы прямо «рядом»
        const database = [
            { 
                name: "Ольга К. (?)", image: "olga.png",
                eyes: "⚠️ ДВА ЗРАЧКА В ОДНОМ ГЛАЗУ", pulse: "0 уд/мин (ОТКАЗ ДАТЧИКА)", 
                mouthDraw: "[|||||||||]\nЗубы имитируют норму. Улыбка зафиксирована.", 
                backpack: "Расчёска, записная книжка, старая фотография.",
                hasContraband: false, isMonster: true, 
                anomaly: "ПРИЗНАК: Датчик пульса показывает ноль. Слишком долго смотрит прямо в объектив камеры.",
                scaryMsg: "Существо с поликорией притворилось человеком. Ночью оно вскрыло жилой отсек."
            },
            { 
                name: "Неизвестный рабочий", image: "worker.png",
                eyes: "⚠️ ПОЛНОЕ ОТСУТСТВИЕ СЛЁЗНОГО КАНАЛА И БЕЛКОВ", pulse: "190 уд/мин (КРИТИЧЕСКАЯ ТАХИКАРДИЯ)", 
                mouthDraw: "[|||||||||]\nМеталлический блеск в глубине челюсти.", 
                backpack: "Разводной ключ, пустая фляга, медный кабель.",
                hasContraband: false, isMonster: true, 
                anomaly: "ПРИЗНАК: Спецовка испачкана неизвестным биоматериалом.",
                scaryMsg: "Гибрид прорвался во внутренний периметр. Металлическая челюсть пробила жилые перегородки."
            },
            { 
                name: "Подражатель «Ложная копия»", image: "mimic.png",
                eyes: "⚠️ АСИММЕТРИЯ: Зрачки сфокусированы в разных направлениях", pulse: "45 уд/мин (АНАТОМИЧЕСКАЯ АНОМАЛИЯ)", 
                mouthDraw: "[|#|#|#|#|#|]\nОШИБКА: Структура челюсти деформирована.", 
                backpack: "Инструменты, паёк, грязная ветошь.",
                hasContraband: false, isMonster: true, 
                anomaly: "ПРИЗНАК: Пытается имитировать человеческую мимику, но углы рта неестественно растянуты.",
                scaryMsg: "Ложная копия проникла на базу. Ночью терминал зафиксировал крики в жилом секторе."
            },
            { 
                name: "Охранник смены (Григорий)", image: "guard.png",
                eyes: "НОРМА: Сетчатка соответствует базе данных, реакция на свет есть", pulse: "115 уд/мин (ПОВЫШЕН ИЗ-ЗА СТРЕССА)", 
                mouthDraw: "[=========]\nПолость рта в норме. Зубной ряд без деформаций.", 
                backpack: "Табельный устав, пачка сигарет, фонарик.",
                hasContraband: false, isMonster: false, 
                anomaly: "ПРИЗНАК: Зафиксировано сильное психоэмоциональное напряжение.",
                scaryMsg: "Вы бросили невинного сотрудника охраны умирать в темноте за шлюзом..."
            },
            { 
                name: "Гражданская (Анна)", image: "civilian.png",
                eyes: "НОРМА: Радужка чистая, капилляры расширены от паники", pulse: "140 уд/мин (ТАКТИЛЬНЫЙ ШОК)", 
                mouthDraw: "[=========]\nСлизистые чистые, аномалий не обнаружено.", 
                backpack: "Документы, сухой паёк, тёплый свитер.",
                hasContraband: false, isMonster: false, 
                anomaly: "ПРИЗНАК: Объект находится в состоянии тяжелого стресса, плачет.",
                scaryMsg: "Вы отказали в защите испуганной девушке. Системы зафиксировали её гибель у ворот."
            },
            { 
                name: "Рабочий снабжения (Петр)", image: "supplier.png",
                eyes: "НОРМА: Реакция зрачков адекватная", pulse: "88 уд/мин (НОРМА)",
                mouthDraw: "[=========]\nПолость рта без изменений.",
                backpack: "⚠️ ВНИМАНИЕ: Обнаружена незарегистрированная ампула с мутагеном 'Cryptococcus'!",
                hasContraband: true, isMonster: false,
                anomaly: "ПРИЗНАК: Пытается спрятать рюкзак от сканера вещей.",
                scaryMsg: "Вы впустили человека с образцом заражения. Лабораторный вирус уничтожил бункер за 48 часов."
            }
        ];

        let gameMode = 'classic', score = 0, health = 100, currentVisitor = null;
        let cameraActive = false, gameOver = false, isProcessing = false;
        let monsterRageMode = false;

        const monitorContent = document.getElementById('monitor');
        const btnCamera = document.getElementById('btn-camera');

        const audioCtx = new (window.AudioContext || window.webkitAudioContext)();
        let ambientOsc = null, ambientGain = null;

        function startAmbient() {
            if (ambientOsc) return;
            ambientOsc = audioCtx.createOscillator();
            ambientGain = audioCtx.createGain();
            ambientOsc.type = 'sawtooth';
            ambientOsc.frequency.setValueAtTime(45, audioCtx.currentTime);
            
            const filter = audioCtx.createBiquadFilter();
            filter.type = 'lowpass';
            filter.frequency.setValueAtTime(120, audioCtx.currentTime);

            ambientOsc.connect(filter);
            filter.connect(ambientGain);
            ambientGain.connect(audioCtx.destination);
            
            ambientGain.gain.setValueAtTime(0.12, audioCtx.currentTime);
            ambientOsc.start();
        }

        function playSound(type) {
            if (audioCtx.state === 'suspended') audioCtx.resume();
            const osc = audioCtx.createOscillator();
            const gain = audioCtx.createGain();
            osc.connect(gain);
            gain.connect(audioCtx.destination);
            const now = audioCtx.currentTime;

            if (type === 'click') {
                osc.type = 'sine'; osc.frequency.setValueAtTime(500, now);
                gain.gain.setValueAtTime(0.05, now); gain.gain.exponentialRampToValueAtTime(0.001, now + 0.05);
                osc.start(now); osc.stop(now + 0.05);
            } else if (type === 'scan') {
                osc.type = 'triangle'; osc.frequency.setValueAtTime(200, now);
                osc.frequency.linearRampToValueAtTime(400, now + 0.2);
                gain.gain.setValueAtTime(0.03, now); gain.gain.exponentialRampToValueAtTime(0.001, now + 0.2);
                osc.start(now); osc.stop(now + 0.2);
            } else if (type === 'shoot') {
                osc.type = 'sawtooth'; osc.frequency.setValueAtTime(100, now);
                osc.frequency.linearRampToValueAtTime(10, now + 0.4);
                gain.gain.setValueAtTime(0.4, now); gain.gain.linearRampToValueAtTime(0.001, now + 0.4);
                osc.start(now); osc.stop(now + 0.4);
            } else if (type === 'error') {
                osc.type = 'sawtooth'; osc.frequency.setValueAtTime(90, now);
                gain.gain.setValueAtTime(0.2, now); gain.gain.linearRampToValueAtTime(0.001, now + 0.3);
                osc.start(now); osc.stop(now + 0.3);
            } else if (type === 'siren') {
                osc.type = 'sawtooth'; osc.frequency.setValueAtTime(300, now);
                osc.frequency.linearRampToValueAtTime(600, now + 0.5);
                gain.gain.setValueAtTime(0.2, now); gain.gain.linearRampToValueAtTime(0.001, now + 0.6);
                osc.start(now); osc.stop(now + 0.6);
            }
        }

        function setButtonsDisabled(state) {
            document.getElementById('btn-in').disabled = state;
            document.getElementById('btn-out').disabled = state;
            document.getElementById('btn-shoot').disabled = state;
            btnCamera.disabled = state;
        }

        function startGame(mode) {
            gameMode = mode; score = 0; health = 100; gameOver = false; isProcessing = false; monsterRageMode = false;
            startAmbient();
            playSound('click');
            document.getElementById('menu-screen').style.display = 'none';
            document.getElementById('game-screen').style.display = 'block';
            document.getElementById('hud-mode').innerText = `Режим: ${mode === 'classic' ? 'Классический' : 'Бесконечный'}`;
            updateHUD();
            nextVisitor();
        }

        function updateHUD() {
            document.getElementById('hud-score').innerText = gameMode === 'classic' ? `Обработано: ${score}/50` : `Счёт: ${score}`;
            document.getElementById('hud-lives').innerText = `Стабильность шлюза: ${health}%`;
            document.getElementById('hud-lives').style.color = health <= 35 ? '#ff3333' : '#ff5555';
        }

        function nextVisitor() {
            if (gameOver) return;
            cameraActive = false;
            monsterRageMode = false;
            btnCamera.innerText = "[ ] ВКЛЮЧИТЬ КАМЕРУ";
            btnCamera.style.background = "#002200";

            const randomIndex = Math.floor(Math.random() * database.length);
            currentVisitor = JSON.parse(JSON.stringify(database[randomIndex]));

            runScanningAnimation();
        }

        function runScanningAnimation() {
            isProcessing = true;
            setButtonsDisabled(true);
            let pct = 0;
            monitorContent.innerHTML = `<div style="padding-top:100px; text-align:center; font-weight:bold;" class="blinking">[ИНИЦИАЛИЗАЦИЯ ПОДКЛЮЧЕНИЯ...]</div>`;
            
            const interval = setInterval(() => {
                pct += 10;
                playSound('scan');
                monitorContent.innerHTML = `
                    <div style="padding-top:80px; text-align:center; font-family:monospace;">
                        <span style="color:#ff3333; font-weight:bold;">[ОКП-4: СКАНИРОВАНИЕ БИОМЕТРИИ ОБЪЕКТА]</span><br><br>
                        <div style="border: 1px solid #00ff00; width: 300px; height: 20px; margin: 10px auto; position:relative;">
                            <div style="background:#00ff00; width: ${pct}%; height:100%;"></div>
                        </div>
                        <span>ПРОГРЕСС: ${pct}%</span>
                    </div>`;
                if (pct >= 100) {
                    clearInterval(interval);
                    isProcessing = false;
                    setButtonsDisabled(false);
                    renderVisitor();
                }
            }, 100);
        }

        function handleImgError(imgElement) {
            imgElement.style.display = 'none';
            const container = imgElement.parentElement;
            
            let shadowType = "ГУМАНОИДНЫЙ СИЛУЭТ";
            if (monsterRageMode) shadowType = "БИОМЕХАНИЧЕСКАЯ МАССА [КРИТИЧЕСКАЯ УГРОЗА]";
            
            const rawFilename = monsterRageMode ? 'mimic_rage.png' : currentVisitor.image;
            
            const glitchBox = document.createElement('div');
            glitchBox.style.cssText = "color: #00ff00; border: 2px dashed #ff3333; padding: 20px; text-align: center; background: #100; width: 85%; box-shadow: 0 0 15px rgba(255,0,0,0.2); font-size:12px;";
            glitchBox.innerHTML = `
                <span style="color:#ff3333; font-weight:bold;" class="blinking">⚠️ СИГНАЛ АКТИВЕН (РЕЖИМ СИЛУЭТА)</span><br><br>
                ДАТЧИК ДВИЖЕНИЯ ФИКСИРУЕТ: <span style="color:#fff;">${shadowType}</span><br>
                <span style="color:#888; font-size:11px;"><br>Браузер не видит картинку. Убедись, что файл <b style="color:#00ffff;">"${rawFilename}"</b> лежит в той же папке, где и сам этот запущенный HTML-файл игры.</span>
            `;
            
            const oldAlert = container.querySelector('.img-error-alert');
            if (!oldAlert) {
                glitchBox.classList.add('img-error-alert');
                container.appendChild(glitchBox);
            }
        }

        function renderVisitor() {
            if (gameOver) return;

            if (cameraActive) {
                // Ищем картинки прямо в корне текущего расположения файла игры
                const currentImg = monsterRageMode ? "mimic_rage.png" : currentVisitor.image;
                monitorContent.innerHTML = `
                    <div id="video-stream-box" style="position: relative; width: 100%; height: 100%; background: #000; display: flex; flex-direction: column; align-items: center; justify-content: center;">
                        <img src="${currentImg}" onload="this.style.display='block';" onerror="handleImgError(this)" alt="CAM_FEED" style="max-width: 90%; max-height: 80%; border: 1px solid #00ff00; display:none;">
                        <div style="color: #00ff00; font-size: 11px; margin-top: 8px;" class="blinking">• CAM_01_FEED_ONLINE ${monsterRageMode ? '[ТРЕВОГА: МУТАЦИЯ]' : ''}</div>
                    </div>`;
            } else {
                if (monsterRageMode) {
                    monitorContent.innerHTML = `
                        <div style="color:#ff3333; font-weight:bold; text-align:center; padding-top:60px;">
                            <h2 class="blinking">⚠️ КРИТИЧЕСКАЯ УГРОЗА СЕКТОРУ ⚠️</h2>
                            <p>ОБЪЕКТ МУТИРОВАЛ ПОСЛЕ ОБСТРЕЛА. СИСТЕМА ДВЕРЕЙ БЛОКИРОВАНА!</p>
                            <p style="color:#fff; margin-top:20px;">[ВКЛЮЧИТЕ КАМЕРУ ДЛЯ ВИЗУАЛЬНОЙ ВЕРИФИКАЦИИ ЦЕЛИ]</p>
                            <p style="color:#ff5555;">ТРЕБУЕТСЯ ПОВТОРНЫЙ ЗАЛП ТУРЕНЕЙ ДЛЯ ПОЛНОЙ ЛИКВИДАЦИИ!</p>
                        </div>`;
                } else {
                    monitorContent.innerHTML = `
                        <div class="stat-line" style="color:#ff3333; font-weight:bold;">[ПРОТОКОЛ ТЕРМИНАЛА ОКП-4]</div>
                        <div class="stat-line"><b>Субъект:</b> ${currentVisitor.name}</div>
                        <div class="stat-line"><b>Сетчатка глаза:</b> ${currentVisitor.eyes}</div>
                        <div class="stat-line"><b>Частота пульса:</b> ${currentVisitor.pulse}</div>
                        <div class="stat-line" style="color:#00ffff; margin-top:8px;"><b>[СКАНИРОВАНИЕ РОТОВОЙ ПОЛОСТИ]:</b></div>
                        <div class="stat-line" style="color: ${currentVisitor.isMonster ? '#ff5555' : '#00ff00'}">${currentVisitor.mouthDraw.replace(/\n/g, '<br>')}</div>
                        <div class="stat-line" style="color:#00ffff; margin-top:8px;"><b>[ИНСПЕКЦИЯ ЛИЧНЫХ ВЕЩЕЙ]:</b></div>
                        <div class="stat-line" style="color: ${currentVisitor.hasContraband ? '#ff3333' : '#00ff00'}">>> ${currentVisitor.backpack}</div>
                        <div class="stat-line anomaly-box" style="margin-top:10px;"><b>Анализ периметра:</b><br>>> ${currentVisitor.anomaly}</div>
                    `;
                }
            }
        }

        function toggleCamera() {
            if (gameOver || isProcessing) return;
            playSound('scan');
            cameraActive = !cameraActive;
            btnCamera.innerText = cameraActive ? "[👁️] КАМERA АКТИВНА" : "[ ] ВКЛЮЧИТЬ КАМЕРУ";
            btnCamera.style.background = cameraActive ? "#004400" : "#002200";
            renderVisitor();
        }

        function runDoorAnimation(callback) {
            isProcessing = true;
            setButtonsDisabled(true);
            let pct = 0;
            const interval = setInterval(() => {
                pct += 20;
                playSound('scan');
                monitorContent.innerHTML = `
                    <div style="padding-top:80px; text-align:center; color:#55ff55;">
                        <b>[ГИДРАВЛИКА: СИСТЕМА ГЕРМОЗАТВОРОВ]</b><br><br>
                        <span>ОТКРЫТИЕ ВНЕШНЕГО ШЛЮЗА... СЕКТОР ОКП-4</span><br>
                        <div style="border: 1px solid #55ff55; width: 250px; height: 15px; margin: 10px auto;">
                            <div style="background:#55ff55; width: ${pct}%; height:100%;"></div>
                        </div>
                        <b>СТАТУС ШЛЮЗА: ${pct}%</b>
                    </div>`;
                if (pct >= 100) {
                    clearInterval(interval);
                    isProcessing = false;
                    setButtonsDisabled(false);
                    callback();
                }
            }, 100);
        }

        function processVisitor(wantsToLetIn) {
            if (gameOver || isProcessing) return;

            if (monsterRageMode) {
                playSound('error');
                return;
            }

            if (wantsToLetIn) {
                if (currentVisitor.isMonster) {
                    triggerScreamer(currentVisitor.scaryMsg);
                    return;
                } else if (currentVisitor.hasContraband) {
                    triggerGameOver(currentVisitor.scaryMsg);
                    return;
                } else {
                    runDoorAnimation(() => {
                        score++;
                        checkWinCondition();
                    });
                }
            } else {
                if (currentVisitor.isMonster || currentVisitor.hasContraband) {
                    score++;
                } else {
                    health -= 35;
                    checkHealth(currentVisitor.scaryMsg);
                    return;
                }
                checkWinCondition();
            }
        }

        function shootVisitor() {
            if (gameOver || isProcessing) return;

            if (currentVisitor.isMonster && !monsterRageMode) {
                isProcessing = true;
                setButtonsDisabled(true);
                monitorContent.classList.add('flash-red');
                playSound('shoot');

                setTimeout(() => {
                    monitorContent.classList.remove('flash-red');
                    isProcessing = false;
                    setButtonsDisabled(false);
                    
                    monsterRageMode = true;
                    playSound('siren');
                    renderVisitor(); 
                }, 800);
                return;
            }

            isProcessing = true;
            setButtonsDisabled(true);
            monitorContent.classList.add('flash-red');
            playSound('shoot');

            setTimeout(() => {
                monitorContent.classList.remove('flash-red');
                isProcessing = false;
                setButtonsDisabled(false);

                if (monsterRageMode || currentVisitor.hasContraband) {
                    score++;
                    monsterRageMode = false;
                    checkWinCondition();
                } else {
                    health -= 50;
                    checkHealth("Вы ликвидировали лояльного гражданина бункера. Автоматический трибунал понизил стабильность.");
                }
            }, 1000);
        }
